<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; min-height:100%;
    font-family:'Baloo 2', cursive;
    overflow-x:hidden;
    background:#5bc8f5;
  }

/* FOND ANIMÉ */
.sky {
position:fixed; inset:0;
background:linear-gradient(180deg,#5bc8f5 0%,#a8e6ff 55%,#c8f0a0 82%,#6dbf52 100%);
z-index:0;
}
.sun {
position:fixed; top:20px; right:32px;
width:72px; height:72px;
background:radial-gradient(circle,#fffaaa 30%,#FFD700 70%,#ffaa00 100%);
border-radius:50%;
box-shadow:0 0 40px 18px rgba(255,215,0,.4);
animation:pulse 4s ease-in-out infinite;
z-index:1;
}
@keyframes pulse {
0%,100%{box-shadow:0 0 40px 18px rgba(255,215,0,.4);}
50%{box-shadow:0 0 60px 28px rgba(255,215,0,.65);}
}

/* Nuages */
.cloud {
position:fixed; background:white; border-radius:50px;
opacity:.88; z-index:1;
}
.cloud::before,.cloud::after {
content:’’; position:absolute; background:white; border-radius:50%;
}
.c1{width:90px;height:32px;top:55px;left:-110px;animation:fly 20s linear infinite;}
.c1::before{width:48px;height:48px;top:-26px;left:12px;}
.c1::after{width:32px;height:32px;top:-16px;left:46px;}
.c2{width:120px;height:40px;top:100px;left:-150px;animation:fly 28s linear infinite 7s;opacity:.7;}
.c2::before{width:58px;height:58px;top:-30px;left:16px;}
.c2::after{width:40px;height:40px;top:-20px;left:60px;}
.c3{width:70px;height:26px;top:36px;left:-90px;animation:fly 16s linear infinite 13s;opacity:.55;}
.c3::before{width:36px;height:36px;top:-20px;left:9px;}
.c3::after{width:26px;height:26px;top:-13px;left:36px;}
@keyframes fly {
from{transform:translateX(0);}
to{transform:translateX(calc(100vw + 180px));}
}

/* Sol */
.ground {
position:fixed; bottom:0; left:0; right:0; height:50px;
background:linear-gradient(180deg,#56c45a,#2e7d32);
z-index:2; border-radius:55% 55% 0 0/18px 18px 0 0;
}
.flowers {
position:fixed; bottom:36px; left:0; right:0;
display:flex; justify-content:space-around; padding:0 16px;
z-index:3; pointer-events:none;
}
.flower {
font-size:clamp(18px,5vw,26px);
display:inline-block;
animation:sway 3s ease-in-out infinite;
}
.flower:nth-child(2){animation-delay:.4s;}
.flower:nth-child(3){animation-delay:.9s;}
.flower:nth-child(4){animation-delay:1.4s;}
.flower:nth-child(5){animation-delay:.7s;}
.flower:nth-child(6){animation-delay:1.2s;}
@keyframes sway {
0%,100%{transform:rotate(-7deg);}
50%{transform:rotate(7deg) translateY(-3px);}
}

/* Papillons */
.butt {
position:fixed; font-size:22px; z-index:4; pointer-events:none;
animation:flutter 11s ease-in-out infinite;
}
.butt:nth-child(1){top:22%;left:4%;}
.butt:nth-child(2){top:40%;right:5%;animation-delay:3.5s;font-size:18px;}
.butt:nth-child(3){top:14%;left:28%;animation-delay:7s;font-size:16px;}
@keyframes flutter {
0%{transform:translate(0,0);}
25%{transform:translate(18px,-14px);}
50%{transform:translate(-8px,-22px);}
75%{transform:translate(14px,-10px);}
100%{transform:translate(0,0);}
}

/* Bouton musique */
.music-btn {
position:fixed; top:14px; left:14px; z-index:100;
background:rgba(255,255,255,.88);
border:none; border-radius:50%;
width:50px; height:50px; font-size:24px;
cursor:pointer;
box-shadow:0 4px 14px rgba(0,0,0,.15);
display:flex; align-items:center; justify-content:center;
}

/* CONTENU */
.content {
position:relative; z-index:10;
display:flex; flex-direction:column; align-items:center;
padding:18px 14px 110px;
min-height:100vh;
}

/* Titre */
.titre {
text-align:center; margin-top:10px;
animation:drop .7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes drop {
from{opacity:0;transform:translateY(-36px) scale(.8);}
to{opacity:1;transform:translateY(0) scale(1);}
}
.titre-globe {
font-size:clamp(48px,13vw,76px);
display:block;
animation:bob 2.5s ease-in-out infinite 1s;
filter:drop-shadow(0 4px 8px rgba(0,0,0,.14));
}
@keyframes bob {
0%,100%{transform:translateY(0);}
50%{transform:translateY(-9px);}
}
.titre-text {
font-weight:800;
font-size:clamp(26px,7.5vw,50px);
color:#fff;
text-shadow:0 3px 0 #1a6b3c, 0 6px 0 rgba(0,0,0,.14);
letter-spacing:1px; line-height:1.1;
}
.titre-sub {
font-family:‘Nunito’,sans-serif; font-weight:700;
font-size:clamp(13px,3.8vw,19px);
color:rgba(255,255,255,.88);
margin-top:3px;
}

/* GRILLE */
.grid {
display:grid;
grid-template-columns:repeat(2,1fr);
gap:13px;
width:100%; max-width:480px;
margin-top:22px;
}

/* CARTE */
.card {
border-radius:26px;
padding:18px 10px 14px;
text-align:center;
text-decoration:none;
display:flex; flex-direction:column;
align-items:center; gap:7px;
border:3px solid rgba(255,255,255,.8);
box-shadow:0 7px 0 rgba(0,0,0,.13), 0 10px 22px rgba(0,0,0,.09);
position:relative; overflow:hidden;
/* Animation d’entrée */
animation:pop .45s cubic-bezier(.34,1.56,.64,1) both;
/* IMPORTANT : cursor et user-select pour le tactile */
cursor:pointer;
user-select:none;
-webkit-user-select:none;
}
@keyframes pop {
from{opacity:0;transform:scale(.55) translateY(18px);}
to{opacity:1;transform:scale(1) translateY(0);}
}

.card:nth-child(1){animation-delay:.08s;}
.card:nth-child(2){animation-delay:.16s;}
.card:nth-child(3){animation-delay:.24s;}
.card:nth-child(4){animation-delay:.32s;}
.card:nth-child(5){animation-delay:.40s;}
.card:nth-child(6){animation-delay:.48s;}
.card:nth-child(7){animation-delay:.56s;}

/* Feedback tactile via CSS uniquement */
.card:active {
transform:scale(.93) translateY(4px) !important;
box-shadow:0 3px 0 rgba(0,0,0,.13), 0 4px 10px rgba(0,0,0,.09) !important;
transition:transform .1s, box-shadow .1s;
}

/* Couleurs */
.c-animaux   { background:linear-gradient(145deg,#fff8f0,#ffe8cc); }
.c-puzzle    { background:linear-gradient(145deg,#f8f0ff,#ece0ff); }
.c-comptines { background:linear-gradient(145deg,#fff0f7,#ffd8ef); }
.c-marin     { background:linear-gradient(145deg,#eef8ff,#cce8ff); }
.c-cuisine   { background:linear-gradient(145deg,#fff5ee,#ffddc8); }
.c-tracteur  { background:linear-gradient(145deg,#f0fff0,#ccffcc); }
.c-bulles    { background:linear-gradient(145deg,#eeffff,#ccf8ff); }

/* Carte large */
.card-large {
grid-column:1/-1;
flex-direction:row;
justify-content:center;
gap:14px;
padding:16px 22px;
}
.card-large .emoji { font-size:clamp(42px,11vw,60px); }
.card-large .label { font-size:clamp(17px,5vw,23px); }

.emoji {
font-size:clamp(38px,10.5vw,56px);
line-height:1;
display:block;
filter:drop-shadow(0 2px 5px rgba(0,0,0,.1));
}
.label {
font-weight:800;
font-size:clamp(13px,3.8vw,17px);
color:#1a3020;
line-height:1.2;
}
.badge {
position:absolute; top:9px; right:9px;
background:rgba(0,0,0,.09); color:#444;
font-family:‘Nunito’,sans-serif; font-weight:900;
font-size:8px; padding:2px 7px;
border-radius:18px; text-transform:uppercase; letter-spacing:.4px;
}

.footer {
margin-top:14px;
font-family:‘Nunito’,sans-serif; font-size:12px;
color:rgba(255,255,255,.7); text-align:center;
}
</style>

<!-- Mélodie intégrée -->

<script>
const Mel = (() => {
  let ac=null, nodes=[], on=false;
  function ctx(){
    if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended') ac.resume();
    return ac;
  }
  function n(freq,t,dur,vol=0.14){
    if(!freq)return;
    const c=ctx(),o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='lowpass';f.frequency.value=2000;
    o.type='sine';o.frequency.value=freq;
    o.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+.02);
    g.gain.setValueAtTime(vol,t+dur-.04);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.start(t);o.stop(t+dur+.01);nodes.push(o);
  }
  function stop(){on=false;nodes.forEach(x=>{try{x.stop();}catch(e){}});nodes=[];}
  const S=[
    [523,.5],[659,.5],[784,.5],[1047,1],
    [988,.5],[784,.5],[659,.5],[523,1],
    [587,.5],[698,.5],[880,.5],[784,1],
    [659,.5],[523,.5],[587,.5],[523,2]
  ];
  const BT=60/110;
  function sched(off){
    let t=off,tot=0;
    S.forEach(([f,b])=>{const d=b*BT;n(f,ctx().currentTime+t,d*.87);t+=d;tot+=d;});
    return tot;
  }
  function start(){
    stop();on=true;
    const dur=sched(0);
    let i=0;
    function loop(){if(!on)return;i++;sched(i*dur);setTimeout(loop,(i*dur-.4)*1000);}
    setTimeout(loop,(dur-.4)*1000);
  }
  return {start,stop};
})();

let musicOn=true, started=false;

function tryStart(){
  if(!started){
    if(musicOn) Mel.start();
    started=true;
  }
}

// Démarrer au premier toucher
document.addEventListener('touchstart', tryStart, {once:true, passive:true});
document.addEventListener('mousedown',  tryStart, {once:true});

// Bouton musique
document.getElementById('mBtn').addEventListener('click', e => {
  e.stopPropagation();
  musicOn=!musicOn;
  e.currentTarget.textContent = musicOn ? '🎵' : '🔇';
  if(musicOn){Mel.start();started=true;} else Mel.stop();
});
</script>
