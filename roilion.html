<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8a020">
<title>Le Roi Lion 🦁 - Malo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'Baloo 2',cursive; touch-action:manipulation; user-select:none; background:#000; }
#c { position:fixed; inset:0; width:100%; height:100%; cursor:crosshair; }

.ripple {
position:fixed; pointer-events:none; z-index:90;
width:44px; height:44px; margin:-22px 0 0 -22px;
border-radius:50%;
border:3px solid rgba(255,220,80,.95);
box-shadow:0 0 12px rgba(255,180,0,.6);
animation:rippleOut .55s ease-out forwards;
}
@keyframes rippleOut { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(2.8);opacity:0;} }

/* ===== HUD ===== */
.hud {
position:fixed; top:0; left:0; right:0; z-index:50;
padding:10px 14px; display:flex; flex-direction:column; gap:6px;
pointer-events:none;
}
.hud-row { display:flex; align-items:center; gap:8px; }
.btn-r {
flex-shrink:0; pointer-events:all;
background:rgba(20,8,0,.7); border:2px solid rgba(255,180,30,.5);
border-radius:50%; width:46px; height:46px; font-size:20px;
color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;
text-decoration:none; backdrop-filter:blur(10px); transition:transform .15s;
box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.btn-r:active { transform:scale(.88); }
.target-box {
flex:1; pointer-events:all;
background:rgba(20,8,0,.65); border:2px solid rgba(255,180,30,.45);
border-radius:18px; padding:5px 12px;
display:flex; align-items:center; gap:8px; backdrop-filter:blur(10px);
box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.target-txt { font-family:‘Nunito’,sans-serif; font-size:11px; color:rgba(255,230,150,.95); white-space:nowrap; }
.target-img {
width:44px; height:44px; object-fit:contain; border-radius:10px;
border:2px solid rgba(255,200,80,.55); background:rgba(0,0,0,.25);
animation:targetBounce 1.2s ease-in-out infinite;
}
@keyframes targetBounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
.score-box {
background:rgba(20,8,0,.7); border:2px solid rgba(255,180,30,.5);
border-radius:16px; padding:4px 12px; text-align:center; backdrop-filter:blur(10px);
box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.score-num { font-size:22px; font-weight:800; color:#FFD700; line-height:1; text-shadow:0 2px 8px rgba(255,140,0,.7); }
.score-lbl { font-family:‘Nunito’,sans-serif; font-size:9px; color:rgba(255,200,100,.8); }
.prog-bar { height:10px; background:rgba(0,0,0,.4); border-radius:8px; overflow:hidden; border:1.5px solid rgba(255,180,30,.45); }
.prog-fill { height:100%; width:0%; background:linear-gradient(90deg,#FFD700,#FF6B00); border-radius:6px; transition:width .35s; }

/* Zone indicator */
.zone-tag {
position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
background:rgba(20,8,0,.7); border:1.5px solid rgba(255,180,30,.45);
border-radius:20px; padding:6px 16px;
font-family:‘Nunito’,sans-serif; font-size:12px; color:rgba(255,230,150,.95);
backdrop-filter:blur(8px); z-index:50; pointer-events:none;
transition:opacity .5s; white-space:nowrap;
box-shadow:0 2px 12px rgba(0,0,0,.4);
}

/* FX */
.collect-fx {
position:fixed; pointer-events:none; z-index:90; font-size:44px;
animation:collectPop .65s ease-out forwards;
}
@keyframes collectPop {
0%  { transform:scale(0) translateY(0); opacity:1; }
60% { transform:scale(1.5) translateY(-24px); opacity:1; }
100%{ transform:scale(0) translateY(-60px); opacity:0; }
}

/* ===== VICTOIRE ===== */
.win-screen {
position:fixed; inset:0; z-index:200;
background:linear-gradient(160deg,#ff8c00 0%,#ffd700 45%,#fff5cc 100%);
display:flex; flex-direction:column; align-items:center; justify-content:center;
gap:8px; opacity:0; pointer-events:none; transition:opacity .5s; overflow:hidden;
}
.win-screen.show { opacity:1; pointer-events:all; }
.win-screen::before { content:’’; position:absolute; top:-60px; left:50%; transform:translateX(-50%); width:300px; height:300px; background:radial-gradient(circle,rgba(255,255,255,.4),transparent 65%); border-radius:50%; animation:halo 3s ease-in-out infinite; pointer-events:none; }
@keyframes halo { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.1);} }
.win-title { font-size:clamp(26px,7vw,44px); color:#7a1a00; font-weight:800; text-shadow:0 3px 0 rgba(255,255,255,.5); animation:titlePop .5s .1s cubic-bezier(.34,1.56,.64,1) both; z-index:2; text-align:center; }
@keyframes titlePop { from{transform:scale(0);} to{transform:scale(1);} }
.win-stars { font-size:clamp(26px,7vw,40px); animation:starsIn .5s .25s cubic-bezier(.34,1.56,.64,1) both; z-index:2; }
@keyframes starsIn { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }
.win-sub { font-family:‘Nunito’,sans-serif; font-size:clamp(13px,3.5vw,17px); color:#5a1a00; animation:fadeUp .5s .3s both; z-index:2; text-align:center; padding:0 20px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
.simba-win { width:min(280px,70vw); height:min(280px,70vw); object-fit:contain; filter:drop-shadow(0 12px 32px rgba(0,0,0,.3)); animation:simbaIn .7s .35s cubic-bezier(.34,1.56,.64,1) both, simbaFloat 2.5s ease-in-out infinite 1s; z-index:2; }
@keyframes simbaIn { from{transform:scale(0) rotate(-15deg);} to{transform:scale(1) rotate(0);} }
@keyframes simbaFloat { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-14px) rotate(2deg);} }
.win-btns { display:flex; gap:14px; animation:fadeUp .5s .5s both; z-index:3; }
.win-btn { padding:13px 26px; border:none; border-radius:20px; font-family:‘Baloo 2’,cursive; font-weight:800; font-size:clamp(14px,4vw,18px); cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.2); transition:transform .1s; }
.win-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2); }
.btn-rejouer { background:#FF6B00; color:white; }
.btn-menu    { background:rgba(255,255,255,.75); color:#5a1a00; }
.savane-win { position:absolute; bottom:0; left:0; right:0; height:70px; background:linear-gradient(180deg,#7dc43a,#3d7a10); border-radius:55% 55% 0 0/24px 24px 0 0; z-index:1; }
.savane-win::before { content:‘🌾 🌿 🌾 🌿 🌾 🌿 🌾’; position:absolute; top:-14px; left:0; right:0; font-size:18px; text-align:center; letter-spacing:6px; }
.confetti { position:absolute; border-radius:2px; pointer-events:none; animation:confettiFall linear forwards; z-index:1; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }
</style>

</head>
<body>

<audio id="bgMusic" loop preload="auto">
  <source src="cycle de la vie.mp3" type="audio/mpeg">
</audio>

<canvas id="c"></canvas>

<div class="hud">
  <div class="hud-row">
    <a class="btn-r" href="index.html">⬅️</a>
    <div class="target-box">
      <div class="target-txt">Trouve</div>
      <img class="target-img" id="targetImg" src="" alt="cible">
      <div class="target-txt" id="targetName">...</div>
    </div>
    <div class="score-box">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-lbl">/ 10</div>
    </div>
    <button class="btn-r" id="mBtn">🎵</button>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
</div>

<div class="zone-tag" id="zoneTag">🌅 Savane de la Fierté</div>

<div class="win-screen" id="winScreen">
  <div class="win-title">🏆 Bravo Malo !</div>
  <div class="win-stars">⭐ ⭐ ⭐</div>
  <div class="win-sub">Tu as tout trouvé ! Simba est fier de toi ! 🦁👑</div>
  <img class="simba-win" src="Photoroom_20260419_110623.png" alt="Simba">
  <div class="win-btns">
    <button class="win-btn btn-rejouer" id="btnRejouer">🔄 Rejouer</button>
    <a class="win-btn btn-menu" href="index.html">🏠 Menu</a>
  </div>
  <div class="savane-win"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ============================================================
   CONFIG JEUX
   ============================================================ */
const TARGETS = [
  {emoji:'🦓',name:'Zèbre'},{emoji:'🐘',name:'Éléphant'},{emoji:'🦒',name:'Girafe'},
  {emoji:'🦏',name:'Rhino'},{emoji:'🐊',name:'Croco'},{emoji:'🦛',name:'Hippo'},
  {emoji:'🐒',name:'Singe'},{emoji:'🦜',name:'Perroquet'},{emoji:'🦩',name:'Flamant'},
  {emoji:'🐆',name:'Guépard'},
];
const OBSTACLES_EMO = ['🪨','🌵','🌿','🌾'];
const MAX_SCORE = 10;
const WORLD = 55; // monde plus grand

/* ============================================================
   RENDERER
   ============================================================ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xffb060, 60, 160);
scene.background = new THREE.Color(0xff7030);

const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 300);
camera.position.set(0, 22, 20);
camera.lookAt(0,0,0);

function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize',resize);

/* ============================================================
   LUMIÈRES — coucher de soleil Lion King
   ============================================================ */
scene.add(new THREE.AmbientLight(0xffcc80, 0.85));

const sun = new THREE.DirectionalLight(0xff9a30, 2.8);
sun.position.set(30, 45, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(4096,4096);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -WORLD;
sun.shadow.camera.right = WORLD;
sun.shadow.camera.top = WORLD;
sun.shadow.camera.bottom = -WORLD;
sun.shadow.bias = -0.0005;
scene.add(sun);

// Lumière de remplissage chaude
const fillL = new THREE.DirectionalLight(0xffcc60, 0.6);
fillL.position.set(-20, 10, -10);
scene.add(fillL);

// Hémisphère ciel/sol
scene.add(new THREE.HemisphereLight(0xff8840, 0x6b4500, 0.5));

/* ============================================================
   DÉGRADÉ CIEL — plan 3D
   ============================================================ */
function makeSkyGrad(){
  const cv=document.createElement('canvas');
  cv.width=4; cv.height=512;
  const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#0d0a2e');
  g.addColorStop(0.2,'#6b1a50');
  g.addColorStop(0.45,'#cc3a00');
  g.addColorStop(0.65,'#ff7020');
  g.addColorStop(0.8,'#ffb040');
  g.addColorStop(1,'#ffd88a');
  cx.fillStyle=g; cx.fillRect(0,0,4,512);
  const t=new THREE.CanvasTexture(cv);
  return t;
}
const skyMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(800,300),
  new THREE.MeshBasicMaterial({map:makeSkyGrad(), depthWrite:false, side:THREE.FrontSide})
);
skyMesh.position.set(0,80,-180);
scene.add(skyMesh);

/* ============================================================
   SOL SAVANE — texture riche
   ============================================================ */
function makeSavannaTexture(){
  const S=1024;
  const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');

  // Fond de base — dégradé terracotta
  const g=cx.createRadialGradient(S/2,S/2,0,S/2,S/2,S*.7);
  g.addColorStop(0,'#d4920a');
  g.addColorStop(0.4,'#c07808');
  g.addColorStop(0.8,'#a86006');
  g.addColorStop(1,'#8a4a04');
  cx.fillStyle=g; cx.fillRect(0,0,S,S);

  // Variations de couleur — taches
  for(let i=0;i<200;i++){
    const x=Math.random()*S, y=Math.random()*S;
    const r=4+Math.random()*22;
    const gp=cx.createRadialGradient(x,y,0,x,y,r);
    const c=Math.random()>.5?'rgba(180,120,20,0.25)':'rgba(80,40,0,0.18)';
    gp.addColorStop(0,c); gp.addColorStop(1,'transparent');
    cx.fillStyle=gp; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill();
  }

  // Craquelures sol sec
  cx.globalAlpha=0.22;
  for(let i=0;i<500;i++){
    cx.beginPath();
    const x=Math.random()*S, y=Math.random()*S;
    const len=8+Math.random()*30;
    const angle=Math.random()*Math.PI;
    cx.moveTo(x,y);
    cx.lineTo(x+Math.cos(angle)*len, y+Math.sin(angle)*len);
    cx.strokeStyle=Math.random()>.6?'#7a3a02':'#e8b040';
    cx.lineWidth=.5+Math.random()*.8;
    cx.stroke();
  }

  // Touffes d'herbe sèche ponctuelles
  cx.globalAlpha=0.55;
  cx.font='12px serif';
  const blades=['|','/','\\','\'',',','.'];
  for(let i=0;i<400;i++){
    const x=Math.random()*S, y=Math.random()*S;
    cx.fillStyle=Math.random()>.5?'#a8b840':'#c8c040';
    cx.fillText(blades[Math.floor(Math.random()*blades.length)],x,y);
  }

  // Pierres
  cx.globalAlpha=0.3;
  for(let i=0;i<30;i++){
    const x=Math.random()*S, y=Math.random()*S;
    const rp=3+Math.random()*8;
    cx.fillStyle='#8a7060';
    cx.beginPath(); cx.ellipse(x,y,rp,rp*.6,Math.random(),0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
  return new THREE.CanvasTexture(cv);
}

// Zone herbe verte (lisière jungle)
function makeJungleTexture(){
  const S=512;
  const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,S,S);
  g.addColorStop(0,'#2d6a0a'); g.addColorStop(0.5,'#3a8010'); g.addColorStop(1,'#1a5008');
  cx.fillStyle=g; cx.fillRect(0,0,S,S);
  cx.globalAlpha=0.4;
  for(let i=0;i<300;i++){
    cx.beginPath();
    const x=Math.random()*S, y=Math.random()*S;
    const r=2+Math.random()*12;
    cx.arc(x,y,r,0,Math.PI*2);
    cx.fillStyle=Math.random()>.5?'#4aaa18':'#1a4808';
    cx.fill();
  }
  cx.globalAlpha=1;
  return new THREE.CanvasTexture(cv);
}

// Plan sol principal — grande savane
const groundTex = makeSavannaTexture();
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
groundTex.repeat.set(8,8);

const groundGeo = new THREE.PlaneGeometry(WORLD*2, WORLD*2, 80, 80);
// Ondulation terrain
const pos=groundGeo.attributes.position.array;
for(let i=0;i<pos.length;i+=3){
  const px=pos[i], pz=pos[i+1];
  pos[i+2] = Math.sin(px*.15)*0.4 + Math.cos(pz*.18)*0.3 + (Math.random()-.5)*0.25;
}
groundGeo.computeVertexNormals();

const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({map:groundTex}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true;
scene.add(ground);

// Bord jungle (côté nord-ouest) — plan vert
const jungleFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(40,30),
  new THREE.MeshLambertMaterial({map:makeJungleTexture()})
);
jungleFloor.rotation.x=-Math.PI/2;
jungleFloor.position.set(-35, 0.05, -35);
jungleFloor.receiveShadow=true;
scene.add(jungleFloor);

/* ============================================================
   POINT D'EAU — grand lac animé
   ============================================================ */
function makeWaterTexture(){
  const S=512;
  const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');
  // Base bleue profonde
  const g=cx.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
  g.addColorStop(0,'#60c8f0'); g.addColorStop(0.5,'#3090c8'); g.addColorStop(1,'#1a5888');
  cx.fillStyle=g; cx.fillRect(0,0,S,S);
  // Reflets
  cx.globalAlpha=0.35;
  for(let i=0;i<60;i++){
    const x=Math.random()*S, y=Math.random()*S;
    const w=10+Math.random()*60, h=2+Math.random()*8;
    cx.fillStyle='rgba(255,255,255,0.5)';
    cx.beginPath(); cx.ellipse(x,y,w,h,Math.random()*.5,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
  return new THREE.CanvasTexture(cv);
}

// Géométrie eau avec vagues (ondulation dans gameloop)
const waterGeo = new THREE.CircleGeometry(14, 64);
const waterMat = new THREE.MeshLambertMaterial({
  map: makeWaterTexture(),
  transparent:true, opacity:0.82,
  color:0x40aae0
});
const waterMesh = new THREE.Mesh(waterGeo, waterMat);
waterMesh.rotation.x=-Math.PI/2;
waterMesh.position.set(22, 0.04, 18);
waterMesh.receiveShadow=true;
scene.add(waterMesh);

// Rive du point d'eau — bord sableux
const beachGeo=new THREE.RingGeometry(13.5,17,64);
function makeBeachTex(){
  const S=256; const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');
  cx.fillStyle='#e8c878'; cx.fillRect(0,0,S,S);
  cx.globalAlpha=0.3;
  for(let i=0;i<200;i++){
    cx.fillStyle=Math.random()>.5?'#d4b060':'#c8a050';
    cx.beginPath(); cx.arc(Math.random()*S,Math.random()*S,1+Math.random()*3,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
  return new THREE.CanvasTexture(cv);
}
const beach=new THREE.Mesh(beachGeo, new THREE.MeshLambertMaterial({map:makeBeachTex()}));
beach.rotation.x=-Math.PI/2;
beach.position.set(22,0.03,18);
beach.receiveShadow=true;
scene.add(beach);

// Reflets eau animés (sprites)
const waterSprites=[];
for(let i=0;i<8;i++){
  const cv2=document.createElement('canvas'); cv2.width=64; cv2.height=16;
  const cx2=cv2.getContext('2d');
  cx2.fillStyle='rgba(255,255,255,0.7)';
  cx2.beginPath(); cx2.ellipse(32,8,28,4,0,0,Math.PI*2); cx2.fill();
  const t=new THREE.CanvasTexture(cv2);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,opacity:.5,depthWrite:false}));
  const angle=Math.random()*Math.PI*2;
  sp.scale.set(3+Math.random()*4, 0.6, 1);
  sp.position.set(22+Math.cos(angle)*8, 0.15, 18+Math.sin(angle)*8);
  sp.userData={angle, speed:0.3+Math.random()*.3, r:8+Math.random()*4};
  scene.add(sp);
  waterSprites.push(sp);
}

/* ============================================================
   CASCADE — coin nord-est
   ============================================================ */
// Falaise rocheuse
function makeCliff(){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0x7a6050});
  const matDark=new THREE.MeshLambertMaterial({color:0x5a4030});

  // Corps principal falaise
  const base=new THREE.Mesh(new THREE.BoxGeometry(12,14,8),mat);
  base.position.set(0,7,0); base.castShadow=true; g.add(base);
  // Saille gauche
  const l=new THREE.Mesh(new THREE.BoxGeometry(5,10,7),matDark);
  l.position.set(-7,5,0.5); l.castShadow=true; g.add(l);
  // Épaule droite
  const r=new THREE.Mesh(new THREE.BoxGeometry(4,8,6),mat);
  r.position.set(7,4,0); r.castShadow=true; g.add(r);
  // Rebord supérieur
  const top=new THREE.Mesh(new THREE.BoxGeometry(13,2.5,9),new THREE.MeshLambertMaterial({color:0x6a8a20}));
  top.position.set(0,14.2,0); top.castShadow=true; g.add(top);
  // Détails rochers
  [[3,12,2,2],[−4,9,3,1.5],[−6,13,2,1.2],[5,11,3,1.8]].forEach(([x,y,z,r])=>{
    const ro=new THREE.Mesh(new THREE.DodecahedronGeometry(r,0),mat);
    ro.position.set(x,y,z); ro.rotation.set(Math.random(),Math.random(),Math.random());
    ro.castShadow=true; g.add(ro);
  });

  g.position.set(-30, 0, -42);
  scene.add(g);
  return g;
}
makeCliff();

// Eau cascade — ruban blanc animé
const cascadeParticles=[];
function makeCascadeParticle(idx){
  const cv=document.createElement('canvas'); cv.width=24; cv.height=64;
  const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,0,64);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(0.3,'rgba(200,240,255,0.9)');
  g.addColorStop(0.7,'rgba(180,230,255,0.7)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=g; cx.fillRect(0,0,24,64);

function makePalmTree(x,z,scale=1){
  const g=new THREE.Group();
  // Tronc courbé (segments)
  const trunkMat=new THREE.MeshLambertMaterial({color:0x7a5a20});
  const segments=6;
  for(let i=0;i<segments;i++){
    const seg=new THREE.Mesh(new THREE.CylinderGeometry(0.18-i*.015, 0.22-i*.01, 1.2, 7), trunkMat);
    const lean=i*.08;
    seg.position.set(Math.sin(lean)*i*.6, i*1.1+0.6, 0);
    seg.rotation.z=lean*.4;
    seg.castShadow=true;
    g.add(seg);
  }
  // Feuilles palmier
  const leafMat=new THREE.MeshLambertMaterial({color:0x2a7a10, side:THREE.DoubleSide});
  const leafDarkMat=new THREE.MeshLambertMaterial({color:0x1a5808, side:THREE.DoubleSide});
  const topY=segments*1.1;
  const topX=Math.sin(.08*segments)*(segments-1)*.6;
  for(let li=0;li<7;li++){
    const angle=(li/7)*Math.PI*2;
    const leaf=new THREE.Mesh(
      new THREE.PlaneGeometry(0.3+Math.random()*.15, 3.5+Math.random()*.8),
      li%2===0?leafMat:leafDarkMat
    );
    leaf.position.set(topX+Math.cos(angle)*.4, topY+Math.random()*.3, Math.sin(angle)*.4);
    leaf.rotation.set(-Math.PI/5+Math.random()*.2, angle, Math.PI/6*Math.cos(angle));
    leaf.castShadow=true;
    g.add(leaf);
  }
  // Noix de coco
  for(let ci=0;ci<3;ci++){
    const coco=new THREE.Mesh(new THREE.SphereGeometry(.28,7,6),new THREE.MeshLambertMaterial({color:0x5a3a10}));
    const ca=(ci/3)*Math.PI*2;
    coco.position.set(topX+Math.cos(ca)*.5, topY-.5, Math.sin(ca)*.5);
    g.add(coco);
  }
  g.position.set(x,0,z);
  g.scale.setScalar(scale*(0.8+Math.random()*.5));
  scene.add(g);
  return g;
}

function makeJungleBush(x,z){

// Fougères (plans texturés)
function makeFern(x,z){
  const cv=document.createElement('canvas'); cv.width=cv.height=128;
  const cx=cv.getContext('2d');
  cx.fillStyle='rgba(0,0,0,0)';
  cx.clearRect(0,0,128,128);
  cx.strokeStyle='#3a8810'; cx.lineWidth=2;
  for(let fi=0;fi<8;fi++){
    const angle=(fi/8)*Math.PI*2;
    cx.beginPath(); cx.moveTo(64,80);
    cx.quadraticCurveTo(64+Math.cos(angle)*20,80+Math.sin(angle)*20, 64+Math.cos(angle)*45,80+Math.sin(angle)*50-30);
    cx.strokeStyle=fi%2===0?'#3a8810':'#4aaa18'; cx.stroke();
    // Petites feuilles
    for(let li=1;li<=4;li++){
      const t2=li/5;
      const lx=64+Math.cos(angle)*45*t2, ly=80+Math.sin(angle)*50*t2-30*t2;
      cx.beginPath(); cx.ellipse(lx,ly,5,2,angle,0,Math.PI*2);
      cx.fillStyle='rgba(60,130,20,0.8)'; cx.fill();
    }
  }
  const t=new THREE.CanvasTexture(cv);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false}));
  sp.scale.set(2.5,2.5,1); sp.position.set(x,1.2,z);
  scene.add(sp);
  return sp;
}

];

  const x=simbaPos.x, z=simbaPos.z;

        lastZone=zn.name;

        tag.style.opacity='1';
        clearTimeout(tag._t);
        tag._t=setTimeout(()=>tag.style.opacity='0',3000);
      }
      break;
    }

   ============================================================ */
function handleTap(cx,cy){
  if(gameOver) return;
  if(!started) startMusic();
  if(cy<90) return;
  const w=window.innerWidth,h=window.innerHeight;
  const mouse=new THREE.Vector2((cx/w)*2-1,-(cy/h)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const pt=new THREE.Vector3();
  if(!raycaster.ray.intersectPlane(groundPlane,pt)) return;
  pt.x=Math.max(-WORLD+1,Math.min(WORLD-1,pt.x));
  pt.z=Math.max(-WORLD+1,Math.min(WORLD-1,pt.z));
  simbaTarget.set(pt.x,0,pt.z);
  simbaSpeed=6;
  // Ripple
  const r=document.createElement('div');
  r.className='ripple'; r.style.left=cx+'px'; r.style.top=cy+'px';
  document.body.appendChild(r); setTimeout(()=>r.remove(),650);
}
canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];handleTap(t.clientX,t.clientY);},{passive:false});

/* ============================================================
   COLLISIONS
   ============================================================ */
function checkCollisions(){
  items.forEach(item=>{
    if(!item.userData.alive) return;
    const dist=simbaPos.distanceTo(new THREE.Vector3(item.position.x,0,item.position.z));
    if(dist<2.2){
      const t=TARGETS[currentTarget%TARGETS.length];
      scene.remove(item); item.userData.alive=false;
      items=items.filter(i=>i!==item);
      if(item.userData.emoji===t.emoji){
        score++; playCollect();
        const sc=item.position.clone().project(camera);
        showFX((sc.x+1)/2*window.innerWidth,(-sc.y+1)/2*window.innerHeight,'✅');
        document.getElementById('scoreNum').textContent=score;
        document.getElementById('progFill').style.width=(score/MAX_SCORE*100)+'%';
        if(score>=MAX_SCORE){showVictory();return;}
        if(score%3===0){currentTarget++;updateTargetHUD();}
        if(items.filter(i=>i.userData.alive).length===0) for(let i=0;i<3;i++) spawnItem();
        else setTimeout(spawnItem,900);
      } else {
        playWrong();
        const sc=item.position.clone().project(camera);
        showFX((sc.x+1)/2*window.innerWidth,(-sc.y+1)/2*window.innerHeight,'❌');
        setTimeout(spawnItem,1000);
      }
    }
  });
  obstacleSprites.forEach(obs=>{
    if(!obs.userData.alive) return;
    const dist=simbaPos.distanceTo(new THREE.Vector3(obs.position.x,0,obs.position.z));
    if(dist<1.6){
      const dir=simbaPos.clone().sub(new THREE.Vector3(obs.position.x,0,obs.position.z)).normalize();
      simbaPos.addScaledVector(dir,1.5);
      simbaTarget.copy(simbaPos); simbaSpeed=0; playBump();
    }
  });
}

/* ============================================================
   FX
   ============================================================ */
function showFX(x,y,emoji){
  const el=document.createElement('div');
  el.className='collect-fx'; el.textContent=emoji;
  el.style.left=(x-22)+'px'; el.style.top=(y-22)+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),750);
}

/* ============================================================
   VICTOIRE
   ============================================================ */
function showVictory(){
  gameOver=true;
  document.getElementById('bgMusic').pause();
  setTimeout(()=>{
    document.getElementById('winScreen').classList.add('show');
    launchConfetti(); playVictory();
  },300);
}
function launchConfetti(){
  const colors=['#FFD700','#FF6B00','#FF4444','#44BBFF','#44FF88','#FF88CC'];
  const ws=document.getElementById('winScreen');
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='confetti';
      const s=5+Math.random()*10;
      el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${s}px;height:${s}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*.5}s;`;
      ws.appendChild(el); setTimeout(()=>el.remove(),5000);
    },i*30);
  }
}

/* ============================================================
   SONS
   ============================================================ */
function getAC(){return new(window.AudioContext||window.webkitAudioContext)();}
function playCollect(){try{const ac=getAC();[523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,ac.currentTime+i*.09);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.09+.22);o.start(ac.currentTime+i*.09);o.stop(ac.currentTime+i*.09+.25);});}catch(e){}}
function playWrong(){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sawtooth';o.frequency.setValueAtTime(220,ac.currentTime);o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+.25);g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.28);o.start();o.stop(ac.currentTime+.3);}catch(e){}}
function playBump(){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='square';o.frequency.setValueAtTime(150,ac.currentTime);o.frequency.exponentialRampToValueAtTime(60,ac.currentTime+.15);g.gain.setValueAtTime(.12,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.18);o.start();o.stop(ac.currentTime+.2);}catch(e){}}
function playVictory(){try{const ac=getAC();const fan=[[523,.15],[659,.15],[784,.15],[1047,.3],[784,.1],[1047,.1],[1319,.7]];let t=ac.currentTime+.05;fan.forEach(([f,d])=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.22,t+.02);g.gain.setValueAtTime(.22,t+d-.03);g.gain.linearRampToValueAtTime(0,t+d);o.start(t);o.stop(t+d+.01);t+=d;});}catch(e){}}

/* ============================================================
   MUSIQUE
   ============================================================ */
let musicOn=true,started=false;
const music=document.getElementById('bgMusic');
function startMusic(){if(started&&!music.paused)return;music.volume=.55;music.play().catch(()=>{});started=true;}
document.getElementById('mBtn').addEventListener('click',()=>{musicOn=!musicOn;document.getElementById('mBtn').textContent=musicOn?'🎵':'🔇';if(musicOn)startMusic();else music.pause();});
document.addEventListener('touchstart',function f(){startMusic();document.removeEventListener('touchstart',f);},{once:true,passive:true});

/* ============================================================
   REJOUER
   ============================================================ */
document.getElementById('btnRejouer').addEventListener('click',()=>{
  score=0;gameOver=false;currentTarget=0;
  document.getElementById('scoreNum').textContent='0';
  document.getElementById('progFill').style.width='0%';
  document.getElementById('winScreen').classList.remove('show');
  document.querySelectorAll('.confetti').forEach(e=>e.remove());
  simbaPos.set(0,0,0);simbaTarget.set(0,0,0);simbaSpeed=0;
  initLevel();startMusic();
});

/* ============================================================
   BOUCLE PRINCIPALE
   ============================================================ */
const clock=new THREE.Clock();
let totalTime=0, lastGifUp=0;

function loop(){
  requestAnimationFrame(loop);
  const dt=clock.getDelta(); totalTime+=dt;
  const now=performance.now();

  if(!gameOver){
    // Mouvement Simba
    const dist=simbaPos.distanceTo(simbaTarget);
    if(dist>0.12){
      const dir=simbaTarget.clone().sub(simbaPos).normalize();
      simbaPos.addScaledVector(dir,Math.min(simbaSpeed*dt,dist));
      faceRight=dir.x>=0;
    } else simbaSpeed=0;

    // Bornes monde
    simbaPos.x=Math.max(-WORLD+1,Math.min(WORLD-1,simbaPos.x));
    simbaPos.z=Math.max(-WORLD+1,Math.min(WORLD-1,simbaPos.z));

    // Hauteur sol (légère ondulation)
    const groundY=Math.sin(simbaPos.x*.15)*.25+Math.cos(simbaPos.z*.18)*.2;
    simbaSprite.position.set(simbaPos.x, groundY+2, simbaPos.z);
    simbaSprite.scale.set(faceRight?4:-4,4,1);
    shadowMesh.position.set(simbaPos.x,groundY+.03,simbaPos.z);

    // GIF refresh
    if(now-lastGifUp>80){updateSimbaTex();if(simbaTex)simbaMat.map=simbaTex;simbaMat.needsUpdate=true;lastGifUp=now;}

    // Bob animaux
    items.forEach(item=>{if(!item.userData.alive)return;item.userData.bob+=dt*2.8;item.position.y=1.3+Math.sin(item.userData.bob)*.25;});

    // Nuages
    clouds.forEach(cl=>{cl.position.x+=cl.userData.speed;if(cl.position.x>90)cl.position.x=-90;});

    // Eau — rotation texture légère
    waterMesh.rotation.z+=dt*.025;

    // Reflets eau
    waterSprites.forEach(sp=>{
      sp.userData.angle+=dt*sp.userData.speed;
      sp.position.x=22+Math.cos(sp.userData.angle)*sp.userData.r;
      sp.position.z=18+Math.sin(sp.userData.angle)*sp.userData.r;
      sp.material.opacity=.3+Math.sin(sp.userData.angle*2)*.2;
    });

    // Cascade — particules tombent
    cascadeParticles.forEach(sp=>{
      sp.userData.y-=sp.userData.speed*dt*5;
      if(sp.userData.y<.3) sp.userData.y=12+Math.random()*4;
      sp.position.y=sp.userData.y;
      const wobble=Math.sin(totalTime*3+sp.userData.ox)*.2;
      sp.position.x=-30+sp.userData.ox+wobble;
    });

    // Brume cascade
    mistParticles.forEach(sp=>{
      sp.userData.phase+=dt*.8;
      sp.material.opacity=.2+Math.sin(sp.userData.phase)*.15;
      sp.scale.setScalar(1.5+Math.sin(sp.userData.phase*.7)*.5);
    });

    checkCollisions();
    updateZone();
    updateCamera();
  }

  renderer.render(scene,camera);
}

/* ============================================================
   INIT
   ============================================================ */
initLevel();
loop();
</script>
