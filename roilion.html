<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8a020">
<title>Le Roi Lion - Malo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'Baloo 2',cursive; touch-action:manipulation; user-select:none; background:#000; }
#c { position:fixed; inset:0; width:100%; height:100%; cursor:crosshair; }
#simbaOverlay {
  position:fixed; pointer-events:none; z-index:45;
  width:80px; height:80px;
  transform:translate(-50%,-50%);
  image-rendering:auto;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
.ripple {
  position:fixed; pointer-events:none; z-index:90;
  width:44px; height:44px; margin:-22px 0 0 -22px;
  border-radius:50%;
  border:3px solid rgba(255,220,80,.95);
  box-shadow:0 0 12px rgba(255,180,0,.6);
  animation:rippleOut .55s ease-out forwards;
}
@keyframes rippleOut { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(2.8);opacity:0;} }
.hud {
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:10px 14px; display:flex; flex-direction:column; gap:6px;
  pointer-events:none;
}
.hud-row { display:flex; align-items:center; gap:8px; }
.btn-r {
  flex-shrink:0; pointer-events:all;
  background:rgba(20,8,0,.7); border:2px solid rgba(255,180,30,.5);
  border-radius:50%; width:46px; height:46px; font-size:20px;
  color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;
  text-decoration:none; backdrop-filter:blur(10px); transition:transform .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.btn-r:active { transform:scale(.88); }
.target-box {
  flex:1; pointer-events:all;
  background:rgba(20,8,0,.65); border:2px solid rgba(255,180,30,.45);
  border-radius:18px; padding:5px 12px;
  display:flex; align-items:center; gap:8px; backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.target-txt { font-family:'Nunito',sans-serif; font-size:11px; color:rgba(255,230,150,.95); white-space:nowrap; }
.target-img {
  width:44px; height:44px; object-fit:contain; border-radius:10px;
  border:2px solid rgba(255,200,80,.55); background:rgba(0,0,0,.25);
  animation:targetBounce 1.2s ease-in-out infinite;
}
@keyframes targetBounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
.score-box {
  background:rgba(20,8,0,.7); border:2px solid rgba(255,180,30,.5);
  border-radius:16px; padding:4px 12px; text-align:center; backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.score-num { font-size:22px; font-weight:800; color:#FFD700; line-height:1; text-shadow:0 2px 8px rgba(255,140,0,.7); }
.score-lbl { font-family:'Nunito',sans-serif; font-size:9px; color:rgba(255,200,100,.8); }
.prog-bar { height:10px; background:rgba(0,0,0,.4); border-radius:8px; overflow:hidden; border:1.5px solid rgba(255,180,30,.45); }
.prog-fill { height:100%; width:0%; background:linear-gradient(90deg,#FFD700,#FF6B00); border-radius:6px; transition:width .35s; }
.zone-tag {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(20,8,0,.7); border:1.5px solid rgba(255,180,30,.45);
  border-radius:20px; padding:6px 16px;
  font-family:'Nunito',sans-serif; font-size:12px; color:rgba(255,230,150,.95);
  backdrop-filter:blur(8px); z-index:50; pointer-events:none;
  transition:opacity .5s; white-space:nowrap;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.collect-fx {
  position:fixed; pointer-events:none; z-index:90; font-size:44px;
  animation:collectPop .65s ease-out forwards;
}
@keyframes collectPop {
  0%  { transform:scale(0) translateY(0); opacity:1; }
  60% { transform:scale(1.5) translateY(-24px); opacity:1; }
  100%{ transform:scale(0) translateY(-60px); opacity:0; }
}
/* Flèches directionnelles — canvas dessiné */
.arrow-indicator {
  position:fixed; pointer-events:none; z-index:48;
  width:44px; height:44px;
  transform-origin:center center;
  animation:arrowPulse .7s ease-in-out infinite alternate;
  transition:left .08s, top .08s;
}
@keyframes arrowPulse { from{opacity:.75;transform:scale(0.85);} to{opacity:1;transform:scale(1.15);} }

.win-screen {
position:fixed; inset:0; z-index:200;
background:linear-gradient(160deg,#ff8c00 0%,#ffd700 45%,#fff5cc 100%);
display:flex; flex-direction:column; align-items:center; justify-content:center;
gap:8px; opacity:0; pointer-events:none; transition:opacity .5s; overflow:hidden;
}
.win-screen.show { opacity:1; pointer-events:all; }
.win-screen::before { content:’’; position:absolute; top:-60px; left:50%; transform:translateX(-50%); width:300px; height:300px; background:radial-gradient(circle,rgba(255,255,255,.4),transparent 65%); border-radius:50%; animation:halo 3s ease-in-out infinite; pointer-events:none; }
@keyframes halo { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.1);} }
.win-title { font-size:clamp(26px,7vw,44px); color:#7a1a00; font-weight:800; text-shadow:0 3px 0 rgba(255,255,255,.5); animation:titlePop .5s .1s cubic-bezier(.34,1.56,.64,1) both; z-index:2; text-align:center; }
@keyframes titlePop { from{transform:scale(0);} to{transform:scale(1);} }
.win-stars { font-size:clamp(26px,7vw,40px); animation:starsIn .5s .25s cubic-bezier(.34,1.56,.64,1) both; z-index:2; }
@keyframes starsIn { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }
.win-sub { font-family:‘Nunito’,sans-serif; font-size:clamp(13px,3.5vw,17px); color:#5a1a00; animation:fadeUp .5s .3s both; z-index:2; text-align:center; padding:0 20px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
.simba-win { width:min(280px,70vw); height:min(280px,70vw); object-fit:contain; filter:drop-shadow(0 12px 32px rgba(0,0,0,.3)); animation:simbaIn .7s .35s cubic-bezier(.34,1.56,.64,1) both, simbaFloat 2.5s ease-in-out infinite 1s; z-index:2; }
@keyframes simbaIn { from{transform:scale(0) rotate(-15deg);} to{transform:scale(1) rotate(0);} }
@keyframes simbaFloat { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-14px) rotate(2deg);} }
.win-btns { display:flex; gap:14px; animation:fadeUp .5s .5s both; z-index:3; }
.win-btn { padding:13px 26px; border:none; border-radius:20px; font-family:‘Baloo 2’,cursive; font-weight:800; font-size:clamp(14px,4vw,18px); cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.2); transition:transform .1s; }
.win-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2); }
.btn-rejouer { background:#FF6B00; color:white; }
.btn-menu    { background:rgba(255,255,255,.75); color:#5a1a00; }
.savane-win { position:absolute; bottom:0; left:0; right:0; height:70px; background:linear-gradient(180deg,#7dc43a,#3d7a10); border-radius:55% 55% 0 0/24px 24px 0 0; z-index:1; }
.confetti { position:absolute; border-radius:2px; pointer-events:none; animation:confettiFall linear forwards; z-index:1; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }
</style>

</head>
<body>
<audio id="bgMusic" loop preload="auto">
  <source src="cycle de la vie.mp3" type="audio/mpeg">
</audio>
<canvas id="c"></canvas>
<img id="simbaOverlay" src="simbagif.gif" alt="">
<div class="hud">
  <div class="hud-row">
    <a class="btn-r" href="index.html">⬅️</a>
    <div class="target-box">
      <div class="target-txt">Trouve</div>
      <img class="target-img" id="targetImg" src="" alt="cible">
      <div class="target-txt" id="targetName">...</div>
    </div>
    <div class="score-box">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-lbl">/ 10</div>
    </div>
    <button class="btn-r" id="mBtn">🎵</button>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
</div>
<div class="zone-tag" id="zoneTag">Savane de la Fierté</div>
<div class="win-screen" id="winScreen">
  <div class="win-title">Bravo Malo !</div>
  <div class="win-stars">⭐ ⭐ ⭐</div>
  <div class="win-sub">Tu as tout trouvé ! Simba est fier de toi !</div>
  <img class="simba-win" src="Photoroom_20260419_110623.png" alt="Simba">
  <div class="win-btns">
    <button class="win-btn btn-rejouer" id="btnRejouer">Rejouer</button>
    <a class="win-btn btn-menu" href="index.html">Menu</a>
  </div>
  <div class="savane-win"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const TARGETS_RAW=[
  {emoji:'\u{1F993}',name:'Zèbre'},{emoji:'\u{1F418}',name:'Éléphant'},{emoji:'\u{1F992}',name:'Girafe'},
  {emoji:'\u{1F98F}',name:'Rhino'},{emoji:'\u{1F40A}',name:'Croco'},{emoji:'\u{1F99B}',name:'Hippo'},
  {emoji:'\u{1F412}',name:'Singe'},{emoji:'\u{1F99C}',name:'Perroquet'},{emoji:'\u{1F9A9}',name:'Flamant'},
  {emoji:'\u{1F406}',name:'Guépard'},
];
const OBSTACLES_EMO=['\u{1FAA8}','\u{1F335}','\u{1F33F}','\u{1F33E}'];
const MAX_SCORE=10;
const WORLD=55;

const solidColliders=[];
function addCollider(x,z,r){ solidColliders.push({x,z,r}); }

/* RENDERER */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x87CEEB,60,160);

const camera=new THREE.PerspectiveCamera(52,1,0.1,300);
camera.position.set(0,22,20);
camera.lookAt(0,0,0);

function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize',resize);

/* ===== CIEL BLEU CHAUD — dome ===== */
(function makeSkyDome(){
  const S=512;
  const cv=document.createElement('canvas'); cv.width=4; cv.height=S;
  const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,0,S);
  // Bleu chaud tropical
  g.addColorStop(0.00,'#1a6ab8');
  g.addColorStop(0.18,'#2a8ad8');
  g.addColorStop(0.38,'#4aabea');
  g.addColorStop(0.55,'#72c4f0');
  g.addColorStop(0.72,'#a0d8f5');
  g.addColorStop(0.85,'#c8e8f8');
  g.addColorStop(0.93,'#e8f5e0');
  g.addColorStop(1.00,'#d4e8a0');
  cx.fillStyle=g; cx.fillRect(0,0,4,S);
  const tex=new THREE.CanvasTexture(cv);
  const dome=new THREE.Mesh(
    new THREE.SphereGeometry(240,32,18,0,Math.PI*2,0,Math.PI/2),
    new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide,depthWrite:false})
  );
  scene.add(dome);
})();

/* ===== SOLEIL CHAUD ===== */
(function makeSun(){
  const cv=document.createElement('canvas'); cv.width=cv.height=256;
  const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0,'rgba(255,255,220,1)');
  g.addColorStop(0.2,'rgba(255,240,120,0.95)');
  g.addColorStop(0.5,'rgba(255,200,60,0.5)');
  g.addColorStop(1,'rgba(255,160,0,0)');
  cx.fillStyle=g; cx.beginPath(); cx.arc(128,128,128,0,Math.PI*2); cx.fill();
  const t=new THREE.CanvasTexture(cv);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false}));
  sp.scale.set(55,55,1); sp.position.set(40,55,-170); scene.add(sp);
  const cv2=document.createElement('canvas'); cv2.width=cv2.height=256;
  const cx2=cv2.getContext('2d');
  const g2=cx2.createRadialGradient(128,128,0,128,128,128);
  g2.addColorStop(0,'rgba(255,220,100,0.18)'); g2.addColorStop(1,'rgba(255,200,0,0)');
  cx2.fillStyle=g2; cx2.beginPath(); cx2.arc(128,128,128,0,Math.PI*2); cx2.fill();
  const t2=new THREE.CanvasTexture(cv2);
  const sp2=new THREE.Sprite(new THREE.SpriteMaterial({map:t2,transparent:true,depthWrite:false}));
  sp2.scale.set(140,140,1); sp2.position.set(40,55,-170); scene.add(sp2);
})();

/* ===== NUAGES BLANCS TROPICAUX ===== */
const clouds=[];
(function makeClouds(){
  function cloudTex(big){
    const W=big?480:280, H=big?140:90;
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const cx=cv.getContext('2d'); cx.clearRect(0,0,W,H);
    const blobs=big?
      [[W*.38,H*.55,H*.52],[W*.58,H*.50,H*.38],[W*.22,H*.60,H*.32],[W*.72,H*.52,H*.30],[W*.12,H*.65,H*.22],[W*.84,H*.60,H*.20]]:
      [[W*.42,H*.53,H*.46],[W*.60,H*.50,H*.32],[W*.26,H*.58,H*.28]];
    blobs.forEach(([bx,by,br])=>{
      const g=cx.createRadialGradient(bx,by,0,bx,by,br);
      g.addColorStop(0,'rgba(255,255,255,0.95)');
      g.addColorStop(0.5,'rgba(240,248,255,0.75)');
      g.addColorStop(1,'rgba(200,230,255,0)');
      cx.fillStyle=g; cx.beginPath(); cx.arc(bx,by,br,0,Math.PI*2); cx.fill();
    });
    return new THREE.CanvasTexture(cv);
  }
  const defs=[
    {x:-55,y:42,z:-105,big:true},{x:18,y:48,z:-125,big:false},
    {x:-18,y:38,z:-88,big:true},{x:68,y:44,z:-115,big:false},
    {x:-88,y:40,z:-78,big:false},{x:88,y:50,z:-135,big:true},
    {x:0,y:35,z:-68,big:false},{x:110,y:45,z:-90,big:true},
    {x:-110,y:38,z:-100,big:false},
  ];
  defs.forEach(d=>{
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:cloudTex(d.big),transparent:true,depthWrite:false,opacity:.92}));
    sp.scale.set(d.big?85:52,d.big?28:18,1);
    sp.position.set(d.x,d.y,d.z);
    sp.userData={speed:0.005+Math.random()*.004};
    scene.add(sp); clouds.push(sp);
  });
})();

/* ===== LUMIERES JOUR TROPICAL ===== */
scene.add(new THREE.AmbientLight(0xf0f8ff,1.1));
const sun3=new THREE.DirectionalLight(0xfff5d0,3.2);
sun3.position.set(25,55,15);
sun3.castShadow=true;
sun3.shadow.mapSize.set(4096,4096);
sun3.shadow.camera.near=1; sun3.shadow.camera.far=200;
sun3.shadow.camera.left=-WORLD; sun3.shadow.camera.right=WORLD;
sun3.shadow.camera.top=WORLD; sun3.shadow.camera.bottom=-WORLD;
sun3.shadow.bias=-0.0005;
scene.add(sun3);
const fill3=new THREE.DirectionalLight(0xd0f0ff,0.8);
fill3.position.set(-20,15,-10); scene.add(fill3);
scene.add(new THREE.HemisphereLight(0x88ccff,0x6b8a20,0.7));

/* ===== SOL SAVANE-JUNGLE ===== */
function makeSavannaTexture(){
  const S=1024; const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');
  // Savane dorée avec touches de vert
  const g=cx.createRadialGradient(S/2,S/2,0,S/2,S/2,S*.7);
  g.addColorStop(0,'#d4a020'); g.addColorStop(0.35,'#c08810'); g.addColorStop(0.65,'#b07a08'); g.addColorStop(1,'#7a5204');
  cx.fillStyle=g; cx.fillRect(0,0,S,S);
  // Quelques patches verts (pas trop)
  for(let i=0;i<20;i++){
    const x=Math.random()*S,y=Math.random()*S,r=15+Math.random()*50;
    const gp=cx.createRadialGradient(x,y,0,x,y,r);
    gp.addColorStop(0,'rgba(60,130,20,0.35)');
    gp.addColorStop(1,'transparent');
    cx.fillStyle=gp; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=.4;
  for(let i=0;i<600;i++){
    const x=Math.random()*S,y=Math.random()*S,len=6+Math.random()*25,ang=Math.random()*Math.PI;
    cx.beginPath(); cx.moveTo(x,y); cx.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len);
    cx.strokeStyle=Math.random()>.5?'#4a8818':'#d0a830'; cx.lineWidth=.5+Math.random()*.8; cx.stroke();
  }
  cx.globalAlpha=.65; cx.font='12px serif';
  ['|','/','\\','\'',',','.'].forEach(bl=>{
    for(let i=0;i<80;i++){ cx.fillStyle=Math.random()>.5?'#5ab820':'#c8c040'; cx.fillText(bl,Math.random()*S,Math.random()*S); }
  });
  cx.globalAlpha=1;
  return new THREE.CanvasTexture(cv);
}
const groundTex=makeSavannaTexture();
groundTex.wrapS=groundTex.wrapT=THREE.RepeatWrapping; groundTex.repeat.set(8,8);
const groundGeo=new THREE.PlaneGeometry(WORLD*2,WORLD*2,80,80);
const gpos=groundGeo.attributes.position.array;
for(let i=0;i<gpos.length;i+=3){
  gpos[i+2]=Math.sin(gpos[i]*.15)*.4+Math.cos(gpos[i+1]*.18)*.3+(Math.random()-.5)*.25;
}
groundGeo.computeVertexNormals();
const ground=new THREE.Mesh(groundGeo,new THREE.MeshLambertMaterial({map:groundTex}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

/* ===== JUNGLE FLOOR ===== */
(function makeJungleFloor(){
  const S=512; const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,S,S);
  g.addColorStop(0,'#1a5a08'); g.addColorStop(.5,'#2a7010'); g.addColorStop(1,'#0e3a04');
  cx.fillStyle=g; cx.fillRect(0,0,S,S);
  cx.globalAlpha=.5;
  for(let i=0;i<400;i++){
    cx.beginPath(); cx.arc(Math.random()*S,Math.random()*S,2+Math.random()*14,0,Math.PI*2);
    cx.fillStyle=Math.random()>.5?'#3a9a14':'#0e3204'; cx.fill();
  }
  cx.globalAlpha=1;
  const t=new THREE.CanvasTexture(cv);
  const jf=new THREE.Mesh(new THREE.PlaneGeometry(50,40),new THREE.MeshLambertMaterial({map:t}));
  jf.rotation.x=-Math.PI/2; jf.position.set(-32,.05,-32); jf.receiveShadow=true; scene.add(jf);
  // Zone jungle centrale
  const jf2=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshLambertMaterial({map:t,opacity:.7,transparent:true}));
  jf2.rotation.x=-Math.PI/2; jf2.position.set(10,.05,-10); jf2.receiveShadow=true; scene.add(jf2);
})();

/* ===== POINT D'EAU ===== */
(function makeWater(){
  const S=512; const cv=document.createElement('canvas'); cv.width=cv.height=S;
  const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
  g.addColorStop(0,'#60c8f0'); g.addColorStop(.5,'#3090c8'); g.addColorStop(1,'#1a5888');
  cx.fillStyle=g; cx.fillRect(0,0,S,S);
  cx.globalAlpha=.35;
  for(let i=0;i<60;i++){
    cx.fillStyle='rgba(255,255,255,0.5)';
    cx.beginPath(); cx.ellipse(Math.random()*S,Math.random()*S,10+Math.random()*60,2+Math.random()*8,Math.random()*.5,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
  const t=new THREE.CanvasTexture(cv);
  const wm=new THREE.Mesh(new THREE.CircleGeometry(14,64),new THREE.MeshLambertMaterial({map:t,transparent:true,opacity:.82,color:0x40aae0}));
  wm.rotation.x=-Math.PI/2; wm.position.set(22,.04,18); wm.receiveShadow=true; scene.add(wm);
  scene._waterMesh=wm;
  const S2=256; const cv2=document.createElement('canvas'); cv2.width=cv2.height=S2;
  const cx2=cv2.getContext('2d');
  cx2.fillStyle='#e8c878'; cx2.fillRect(0,0,S2,S2);
  cx2.globalAlpha=.3;
  for(let i=0;i<200;i++){ cx2.fillStyle=Math.random()>.5?'#d4b060':'#c8a050'; cx2.beginPath(); cx2.arc(Math.random()*S2,Math.random()*S2,1+Math.random()*3,0,Math.PI*2); cx2.fill(); }
  cx2.globalAlpha=1;
  const t2=new THREE.CanvasTexture(cv2);
  const beach=new THREE.Mesh(new THREE.RingGeometry(13.5,17,64),new THREE.MeshLambertMaterial({map:t2}));
  beach.rotation.x=-Math.PI/2; beach.position.set(22,.03,18); scene.add(beach);

/* ===== ACACIA ===== */
function makeAcacia(x,z,scale){
  scale=scale||1;
  const g=new THREE.Group();
  const trunkMat=new THREE.MeshLambertMaterial({color:0x7a5018});
  const brMat=new THREE.MeshLambertMaterial({color:0x6a4010});
  const trunkH=3+Math.random()*1.5;
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.12,.22,trunkH,8),trunkMat);
  trunk.position.y=trunkH/2; trunk.castShadow=true; g.add(trunk);
  const numBr=4+Math.floor(Math.random()*3);
  const branchTips=[];
  for(let bi=0;bi<numBr;bi++){
    const bAng=(bi/numBr)*Math.PI*2+Math.random()*.4;
    const bLen=2+Math.random()*1.2;
    const bH=trunkH*.7+Math.random()*.8;
    const tipX=Math.cos(bAng)*bLen, tipZ=Math.sin(bAng)*bLen;
    const br=new THREE.Mesh(new THREE.CylinderGeometry(.03,.07,bLen,6),brMat);
    br.position.set(tipX*.45,bH+.3,tipZ*.45);
    br.rotation.z=(Math.PI/2-.25)*Math.sign(Math.cos(bAng));
    br.rotation.y=bAng; br.castShadow=true; g.add(br);
    branchTips.push({x:tipX,y:bH+.5,z:tipZ});
  }
  branchTips.forEach(bd=>{
    for(let li=0;li<28+Math.floor(Math.random()*18);li++){
      const t=Math.random();
      const lx=bd.x*t+(Math.random()-.5)*.6, lz=bd.z*t+(Math.random()-.5)*.6, ly=bd.y+t*.6+(Math.random()-.5)*.4;
      const ti=Math.floor(Math.random()*leafTexCache.length);
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:leafTexCache[ti],transparent:true,depthWrite:false,opacity:.96}));
      const ls=.42+Math.random()*.52; sp.scale.set(ls,ls*.65,1); sp.position.set(lx,ly,lz); g.add(sp);
    }
  });
  const crownY=trunkH+1; const crownR=2.8+Math.random()*.9;
  for(let ci=0;ci<50+Math.floor(Math.random()*30);ci++){
    const ang=Math.random()*Math.PI*2, rd=Math.random()*crownR;
    const ht=(Math.random()-.5)*.6-(rd/crownR)*.5;
    const ti=Math.floor(Math.random()*leafTexCache.length);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:leafTexCache[ti],transparent:true,depthWrite:false,opacity:.94}));
    const ls=.35+Math.random()*.55; sp.scale.set(ls,ls*.7,1);
    sp.position.set(Math.cos(ang)*rd,crownY+ht,Math.sin(ang)*rd); g.add(sp);
  }
  g.position.set(x,0,z);
  const sc=scale*(0.8+Math.random()*.8); g.scale.setScalar(sc);
  scene.add(g); addCollider(x,z,1.4*sc);
}

/* ===== PALMIER ===== */
function makePalmTree(x,z,scale){
  scale=scale||1;
  const g=new THREE.Group();
  const trunkMat=new THREE.MeshLambertMaterial({color:0x7a5a20});
  const segments=7;
  for(let i=0;i<segments;i++){
    const seg=new THREE.Mesh(new THREE.CylinderGeometry(.2-i*.015,.24-i*.01,1.3,8),trunkMat);
    const lean=i*.07;
    seg.position.set(Math.sin(lean)*i*.6,i*1.15+.65,0);
    seg.rotation.z=lean*.35; seg.castShadow=true; g.add(seg);
  }
  const topY=segments*1.15, topX=Math.sin(.07*segments)*(segments-1)*.6;
  // Texture feuille de palme partagée pour tout l'arbre
  const palmFolCV=document.createElement('canvas'); palmFolCV.width=56; palmFolCV.height=22;
  const palmFolCX=palmFolCV.getContext('2d');
  palmFolCX.fillStyle='#1a6a0e'; palmFolCX.beginPath(); palmFolCX.ellipse(28,11,26,8,0,0,Math.PI*2); palmFolCX.fill();
  palmFolCX.strokeStyle='rgba(0,40,0,0.2)'; palmFolCX.lineWidth=1; palmFolCX.beginPath(); palmFolCX.moveTo(4,11); palmFolCX.lineTo(52,11); palmFolCX.stroke();
  const palmFolTex=new THREE.CanvasTexture(palmFolCV);
  for(let li=0;li<10;li++){
    const angle=(li/10)*Math.PI*2;
    const palmG=new THREE.Group();
    const palmLen=4+Math.random()*1.2;
    const stemMat=new THREE.MeshLambertMaterial({color:0x3a6018});
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(.03,.06,palmLen,5),stemMat);
    stem.rotation.z=(Math.PI/2-.4); stem.rotation.y=angle;
    stem.position.set(Math.cos(angle)*palmLen*.4,-.15,Math.sin(angle)*palmLen*.4);
    palmG.add(stem);
    const folioles=10+Math.floor(Math.random()*6);
    for(let fi=0;fi<folioles;fi++){
      const ft=fi/folioles;
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:palmFolTex,transparent:true,depthWrite:false,opacity:.92}));
      const side=fi%2===0?1:-1, perp=angle+Math.PI/2, dist=ft*palmLen;
      sp.scale.set(.6+ft*.35,.3,1);
      sp.position.set(Math.cos(angle)*dist+Math.cos(perp)*side*.65,-.22-ft*.7,Math.sin(angle)*dist+Math.sin(perp)*side*.65);
      palmG.add(sp);
    }
    palmG.position.set(topX,topY,0); g.add(palmG);
  }
  for(let ci=0;ci<3;ci++){
    const ca=(ci/3)*Math.PI*2;
    const coco=new THREE.Mesh(new THREE.SphereGeometry(.3,7,6),new THREE.MeshLambertMaterial({color:0x4a3208}));
    coco.position.set(topX+Math.cos(ca)*.55,topY-.55,Math.sin(ca)*.55); g.add(coco);
  }
  g.position.set(x,0,z);
  const sc=scale*(.9+Math.random()*.6); g.scale.setScalar(sc);
  scene.add(g); addCollider(x,z,1.1*sc);
}

/* ===== GRAND ARBRE JUNGLE ===== */
function makeJungleTree(x,z,scale){
  scale=scale||1;
  const g=new THREE.Group();
  const trunkMat=new THREE.MeshLambertMaterial({color:0x4a3010});
  const darkMat=new THREE.MeshLambertMaterial({color:0x3a2808});
  const trunkH=5+Math.random()*3;
  // Tronc épais avec contreforts
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.25,.5,trunkH,10),trunkMat);
  trunk.position.y=trunkH/2; trunk.castShadow=true; g.add(trunk);
  // Contreforts à la base
  for(let ci=0;ci<4;ci++){
    const ca=(ci/4)*Math.PI*2;
    const but=new THREE.Mesh(new THREE.BoxGeometry(.4,trunkH*.4,.2),darkMat);
    but.position.set(Math.cos(ca)*.4,trunkH*.2,Math.sin(ca)*.4);
    but.rotation.y=ca; g.add(but);
  }
  // Grande couronne — réutilise leafTexCache global
  const crownY=trunkH+1;
  for(let layer=0;layer<3;layer++){
    const layerR=3+layer*.8, layerY=crownY-layer*.8;
    for(let ci=0;ci<40+layer*15;ci++){
      const ang=Math.random()*Math.PI*2, rd=Math.random()*layerR;
      const ht=(Math.random()-.5)*.8;
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:leafTexCache[Math.floor(Math.random()*leafTexCache.length)],transparent:true,depthWrite:false,opacity:.92}));
      const ls=.45+Math.random()*.65; sp.scale.set(ls,ls*.8,1);
      sp.position.set(Math.cos(ang)*rd,layerY+ht,Math.sin(ang)*rd); g.add(sp);
    }
  }
  g.position.set(x,0,z);
  const sc=scale*(.9+Math.random()*.7); g.scale.setScalar(sc);
  scene.add(g); addCollider(x,z,1.6*sc);
}

function updateArrows(){
  const W=window.innerWidth, H=window.innerHeight;
  const margin=60;
  const activeItems=items.filter(it=>it.userData.alive);
  arrowEls.forEach((el,i)=>{
    if(i>=activeItems.length){el.style.display='none';return;}
    const item=activeItems[i];
    const sp=simba3D.clone().project(camera);
    const ssx=(sp.x+1)/2*W, ssy=(-sp.y+1)/2*H;
    const ip=item.position.clone(); ip.y=1.3;
    const pp=ip.project(camera);
    const ipx=(pp.x+1)/2*W, ipy=(-pp.y+1)/2*H;
    // vecteur direction
    const dx=ipx-ssx, dy=ipy-ssy;
    const angle=Math.atan2(dy,dx); // en radians, 0=droite
    // Est-ce visible ?
    const onScreen=(ipx>50&&ipx<W-50&&ipy>100&&ipy<H-60);
    if(onScreen){el.style.display='none';return;}
    el.style.display='block';
    // Placer la flèche sur le bord de l'écran dans la bonne direction
    const dist=Math.hypot(dx,dy);
    const nx=dx/dist, ny=dy/dist;
    let ex=ssx+nx*120, ey=ssy+ny*120;
    ex=Math.max(margin,Math.min(W-margin,ex));
    ey=Math.max(100,Math.min(H-margin,ey));
    el.style.left=(ex-22)+'px';
    el.style.top=(ey-22)+'px';
    const rotateDeg=(angle+Math.PI/2)*180/Math.PI;
    el.style.transform=`rotate(${rotateDeg}deg)`;
    el.style.display='block';
  });
}

/* ===== COLLISIONS ===== */
const SIMBA_R=1.0;
function resolveCollisions(p){
  for(let iter=0;iter<3;iter++){
    for(const c of solidColliders){
      const dx=p.x-c.x, dz=p.z-c.z;
      const d2=dx*dx+dz*dz;
      const minD=SIMBA_R+c.r;
      if(d2<minD*minD && d2>0.0001){
        const d=Math.sqrt(d2);
        p.x=c.x+(dx/d)*minD;
        p.z=c.z+(dz/d)*minD;
      }
    }
  }
}

}

let isDragging=false;

function getTapWorldPos(cx_,cy_){
  const w=window.innerWidth,h=window.innerHeight;
  const mouse=new THREE.Vector2((cx_/w)*2-1,-(cy_/h)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const pt=new THREE.Vector3();
  if(!raycaster.ray.intersectPlane(groundPlane,pt)) return null;
  pt.x=Math.max(-WORLD+1,Math.min(WORLD-1,pt.x));
  pt.z=Math.max(-WORLD+1,Math.min(WORLD-1,pt.z));
  return pt;
}

function handleTap(cx_,cy_){
  if(gameOver) return;
  if(!started) startMusic();
  if(cy_<90) return;
  const pt=getTapWorldPos(cx_,cy_);
  if(!pt) return;
  simbaTarget.set(pt.x,0,pt.z); simbaSpeed=6;
  const r=document.createElement('div');
  r.className='ripple'; r.style.left=cx_+'px'; r.style.top=cy_+'px';
  document.body.appendChild(r); setTimeout(()=>r.remove(),650);
}

function handleMove(cx_,cy_){
  if(gameOver||!isDragging) return;
  if(cy_<90) return;
  const pt=getTapWorldPos(cx_,cy_);
  if(!pt) return;
  simbaTarget.set(pt.x,0,pt.z); simbaSpeed=6;
}

function checkCollisions(){
  items.forEach(item=>{
    if(!item.userData.alive) return;
    if(simbaPos.distanceTo(new THREE.Vector3(item.position.x,0,item.position.z))<2.8){
      const t=TARGETS_RAW[currentTarget%TARGETS_RAW.length];
      scene.remove(item); item.userData.alive=false; items=items.filter(i=>i!==item);
      if(item.userData.emoji===t.emoji){
        score++; playCollect();
        const sc=item.position.clone().project(camera);
        showFX((sc.x+1)/2*window.innerWidth,(-sc.y+1)/2*window.innerHeight,'\u2705');
        document.getElementById('scoreNum').textContent=score;
        document.getElementById('progFill').style.width=(score/MAX_SCORE*100)+'%';
        if(score>=MAX_SCORE){showVictory();return;}
        if(score%3===0){currentTarget++;updateTargetHUD();}
        if(items.filter(i=>i.userData.alive).length===0) for(let i=0;i<3;i++) spawnItem();
        else setTimeout(spawnItem,900);
      } else {
        playWrong();
        const sc=item.position.clone().project(camera);
        showFX((sc.x+1)/2*window.innerWidth,(-sc.y+1)/2*window.innerHeight,'\u274C');
        setTimeout(spawnItem,1000);
      }
    }
  });
  obstacleSprites.forEach(obs=>{
    if(!obs.userData.alive) return;
    const dist=simbaPos.distanceTo(new THREE.Vector3(obs.position.x,0,obs.position.z));
    if(dist<1.8){
      const dir=simbaPos.clone().sub(new THREE.Vector3(obs.position.x,0,obs.position.z)).normalize();
      simbaPos.addScaledVector(dir,1.8); simbaTarget.copy(simbaPos); simbaSpeed=0; playBump();
    }
  });
}

/* ===== BOUCLE ===== */
const clock=new THREE.Clock();
let totalTime=0;

function loop(){
  requestAnimationFrame(loop);
  const dt=clock.getDelta(); totalTime+=dt;

  if(!gameOver){
    const dist=simbaPos.distanceTo(simbaTarget);
    if(dist>0.12){
      const dir=simbaTarget.clone().sub(simbaPos).normalize();
      simbaPos.addScaledVector(dir,Math.min(simbaSpeed*dt,dist));
      faceRight=dir.x>=0;
    } else simbaSpeed=0;

    simbaPos.x=Math.max(-WORLD+1,Math.min(WORLD-1,simbaPos.x));
    simbaPos.z=Math.max(-WORLD+1,Math.min(WORLD-1,simbaPos.z));

    resolveCollisions(simbaPos);

    const groundY=Math.sin(simbaPos.x*.15)*.25+Math.cos(simbaPos.z*.18)*.2;

    simba3D.set(simbaPos.x,groundY+2,simbaPos.z);
    const proj=simba3D.clone().project(camera);
    simbaOverlay.style.left=((proj.x+1)/2*window.innerWidth)+'px';
    simbaOverlay.style.top=((-proj.y+1)/2*window.innerHeight)+'px';
    simbaOverlay.style.transform='translate(-50%,-50%) scaleX('+(faceRight?1:-1)+')';

    shadowMesh.position.set(simbaPos.x,groundY+.03,simbaPos.z);

    // Bob des items
    items.forEach(item=>{if(!item.userData.alive)return;item.userData.bob+=dt*2.8;item.position.y=2.0+Math.sin(item.userData.bob)*.3;});

    // Nuages
    clouds.forEach(cl=>{cl.position.x+=cl.userData.speed;if(cl.position.x>130)cl.position.x=-130;});

    // Eau
    if(scene._waterMesh) scene._waterMesh.rotation.z+=dt*.025;
    if(scene._foamMesh) scene._foamMesh.rotation.z-=dt*.015;

    // Cascade
    cascadeParticles.forEach(sp=>{
      sp.userData.y-=sp.userData.speed*dt*5;
      if(sp.userData.y<.3) sp.userData.y=14+Math.random()*5;
      sp.position.y=sp.userData.y;
      sp.userData.phase+=dt;
      sp.position.x=-30+sp.userData.ox+Math.sin(sp.userData.phase*2.5+sp.userData.ox)*.25;
      sp.material.opacity=.7+Math.sin(sp.userData.phase*4)*.18;
    });

    mistParticles.forEach(sp=>{
      sp.userData.phase+=dt*.7;
      sp.material.opacity=.18+Math.sin(sp.userData.phase)*.12;
      sp.scale.setScalar(1.4+Math.sin(sp.userData.phase*.6)*.5);
    });

    waterDroplets.forEach(sp=>{
      sp.userData.phase+=dt*(sp.userData.speed);
      sp.position.y=sp.userData.startY-((sp.userData.phase%(1)))*6;
      if(sp.position.y<.3){sp.userData.phase=0;sp.position.y=sp.userData.startY;}
      sp.position.x=-30+sp.userData.ox+Math.sin(sp.userData.phase*8)*.1;
    });

    // Oiseaux africains
    birds.forEach(b=>{
      b.userData.phase+=dt*b.userData.speed;
      b.userData.flapPhase+=dt*b.userData.flapSpeed;
      const px=b.userData.cx0+Math.cos(b.userData.phase)*b.userData.radius;
      const pz=b.userData.cz0+Math.sin(b.userData.phase)*b.userData.radius;
      const py=b.userData.height+Math.sin(b.userData.flapPhase*.5)*1.5;
      b.position.set(px,py,pz);
      // Direction de vol
      const vx=-Math.sin(b.userData.phase)*b.userData.speed;
      b.material.scaleX=vx>=0?1:-1;
      b.scale.x=Math.abs(b.scale.x)*(vx>=0?1:-1);
      // Animation bat des ailes
      const flapState=Math.sin(b.userData.flapPhase)>0;
      b.material.map=flapState?b.userData.texA:b.userData.texB;
      b.material.needsUpdate=true;
    });

    checkCollisions();
    updateZone();
    updateCamera();
    updateArrows();
  }

  renderer.render(scene,camera);
}

initLevel();
loop();
</script>
