<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0066cc">
<title>Les Bulles - Malo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Baloo 2',cursive;
  background:linear-gradient(180deg,#001a4d 0%,#003580 20%,#0066cc 55%,#0099e6 80%,#33bbff 100%);}

.ray{position:fixed;top:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);
transform-origin:top center;pointer-events:none;}
.ray:nth-child(1){left:10%;width:60px;height:70%;transform:rotate(-8deg);}
.ray:nth-child(2){left:25%;width:80px;height:85%;transform:rotate(-3deg);}
.ray:nth-child(3){left:50%;width:60px;height:75%;transform:rotate(5deg);}
.ray:nth-child(4){left:70%;width:50px;height:65%;transform:rotate(10deg);}
.ray:nth-child(5){left:85%;width:60px;height:80%;transform:rotate(-5deg);}

.header{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;
justify-content:space-between;padding:16px 20px;z-index:50;}
.back-btn,.music-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);
border-radius:50%;width:52px;height:52px;font-size:24px;color:white;cursor:pointer;
display:flex;align-items:center;justify-content:center;text-decoration:none;backdrop-filter:blur(8px);}
.score-area{text-align:center;}
.score-label{font-family:‘Nunito’,sans-serif;font-size:11px;color:rgba(255,255,255,.7);
text-transform:uppercase;letter-spacing:1px;}
.score-num{font-size:36px;font-weight:800;color:white;line-height:1;}

.titre{position:fixed;top:90px;left:0;right:0;text-align:center;pointer-events:none;z-index:10;}
.titre h1{font-size:28px;color:white;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.titre p{font-family:‘Nunito’,sans-serif;font-size:14px;color:rgba(255,255,255,.8);margin-top:4px;}

/* BULLES EN DIV */
.bulle{
position:fixed;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:2em;
cursor:pointer;
user-select:none;
-webkit-user-select:none;
animation: monter linear infinite;
background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.8), rgba(255,255,255,.1) 60%, rgba(150,220,255,.3));
border: 2px solid rgba(255,255,255,.6);
box-shadow: inset -4px -4px 10px rgba(0,100,200,.2), 0 0 10px rgba(255,255,255,.2);
transition: transform .1s;
}
.bulle:active{transform:scale(1.2);}

@keyframes monter {
0%   { transform: translateY(110vh) translateX(0px); opacity:0; }
5%   { opacity: 1; }
50%  { transform: translateY(50vh) translateX(var(–drift)); opacity:0.85; }
95%  { opacity: 0.5; }
100% { transform: translateY(-20vh) translateX(calc(var(–drift)*2)); opacity:0; }
}

.pop-effet{position:fixed;pointer-events:none;z-index:80;font-size:40px;
animation:popOut .6s ease-out forwards;}
@keyframes popOut{
0%{transform:scale(0) rotate(0deg);opacity:1;}
60%{transform:scale(1.8) rotate(20deg);opacity:1;}
100%{transform:scale(0) rotate(-20deg);opacity:0;}
}

.bravo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
background:white;border-radius:32px;padding:28px 40px;text-align:center;z-index:100;
box-shadow:0 16px 48px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
pointer-events:none;}
.bravo.show{transform:translate(-50%,-50%) scale(1);}
.bravo-emoji{font-size:64px;display:block;}
.bravo-text{font-size:30px;font-weight:800;color:#0066cc;margin-top:8px;}
</style>

</head>
<body>
<div class="ray"></div><div class="ray"></div><div class="ray"></div>
<div class="ray"></div><div class="ray"></div>

<div class="header">
  <a class="back-btn" href="index.html">⬅️</a>
  <div class="score-area">
    <div class="score-label">Bulles éclatées</div>
    <div class="score-num" id="score">0</div>
  </div>
  <button class="music-btn" id="mBtn">🎵</button>
</div>

<div class="titre">
  <h1>🫧 Les Bulles !</h1>
  <p>Touche les bulles pour les éclater !</p>
</div>

<div class="bravo" id="bravo">
  <span class="bravo-emoji">🎉</span>
  <div class="bravo-text">Super Malo !</div>
</div>

<script src="melody.js"></script>

<script>
var ANIMALS = ['🐟','🐠','🐡','🦈','🐙','🦑','🦀','🦞','🐬','🐳','🦭','🐧','🦐','⭐','🐚','🌊'];
var score = 0, musicOn = true, started = false;
var NB_BULLES = 10;

function startMusic() {
  if (!started && musicOn) { MaloMelody.play('bulles'); started = true; }
}

function showBravo() {
  var el = document.getElementById('bravo');
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

function faireEclater(bulle, animal, x, y) {
  startMusic();
  // effet pop
  var d = document.createElement('div');
  d.className = 'pop-effet';
  d.textContent = animal;
  d.style.left = (x - 20) + 'px';
  d.style.top  = (y - 20) + 'px';
  document.body.appendChild(d);
  setTimeout(function(){ if(d.parentNode) d.parentNode.removeChild(d); }, 700);

  // son
  MaloMelody.playPop(0.8 + Math.random() * 0.6);

  // score
  score++;
  document.getElementById('score').textContent = score;
  if (score % 10 === 0) { showBravo(); MaloMelody.playBravo(); }

  // nouvelle bulle à la place
  resetBulle(bulle);
}

function resetBulle(el) {
  var size = 70 + Math.floor(Math.random() * 70); // 70px à 140px
  var animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
  var left = Math.random() * (window.innerWidth - size);
  var dur  = 4 + Math.random() * 6; // 4s à 10s
  var delay = -Math.random() * dur;  // démarre à un point aléatoire
  var drift = (Math.random() - 0.5) * 80;
  var hue  = Math.floor(Math.random() * 360);

  el.style.width  = size + 'px';
  el.style.height = size + 'px';
  el.style.left   = left + 'px';
  el.style.bottom = '-160px';
  el.style.fontSize = Math.floor(size * 0.5) + 'px';
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = delay + 's';
  el.style.setProperty('--drift', drift + 'px');
  el.style.background = 'radial-gradient(circle at 35% 35%, rgba(255,255,255,.85), hsla('+hue+',80%,80%,.2) 60%, hsla('+hue+',70%,60%,.3))';
  el.dataset.animal = animal;
  el.textContent = animal;
}

function creerBulle() {
  var el = document.createElement('div');
  el.className = 'bulle';

  el.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.changedTouches[0];
    faireEclater(el, el.dataset.animal, t.clientX, t.clientY);
  }, {passive: false});

  el.addEventListener('mousedown', function(e) {
    faireEclater(el, el.dataset.animal, e.clientX, e.clientY);
  });

  resetBulle(el);
  document.body.appendChild(el);
  return el;
}

// Créer toutes les bulles
for (var i = 0; i < NB_BULLES; i++) {
  creerBulle();
}

// Bouton musique
document.getElementById('mBtn').addEventListener('click', function() {
  musicOn = !musicOn;
  document.getElementById('mBtn').textContent = musicOn ? '🎵' : '🔇';
  if (musicOn) { MaloMelody.play('bulles'); started = true; }
  else MaloMelody.stop();
});

// Démarrer musique au premier toucher
document.body.addEventListener('touchstart', function onFirst() {
  startMusic();
  document.body.removeEventListener('touchstart', onFirst);
}, {passive: true, once: true});
</script>

</body>
</html>
