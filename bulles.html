<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Les Bulles Ώθτπ - Malo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'Baloo 2',cursive; touch-action:manipulation; }

.bg { position:fixed; inset:0; background:linear-gradient(180deg,#001a4d 0%,#003580 20%,#0066cc 55%,#0099e6 80%,#33bbff 100%); overflow:hidden; }
.ray { position:absolute; top:0; background:linear-gradient(180deg,rgba(255,255,255,.07),transparent); transform-origin:top center; }
.ray:nth-child(1){left:8%;width:55px;height:70%;transform:rotate(-8deg);}
.ray:nth-child(2){left:24%;width:75px;height:85%;transform:rotate(-2deg);}
.ray:nth-child(3){left:48%;width:60px;height:75%;transform:rotate(5deg);}
.ray:nth-child(4){left:68%;width:50px;height:65%;transform:rotate(10deg);}
.ray:nth-child(5){left:84%;width:65px;height:80%;transform:rotate(-5deg);}
.particle { position:absolute; border-radius:50%; background:rgba(255,255,255,.25); pointer-events:none; animation:rise linear infinite; }
@keyframes rise { from{transform:translateY(110vh)scale(0);opacity:0;} 10%{opacity:.5;} 90%{opacity:.15;} to{transform:translateY(-80px)scale(1);opacity:0;} }

/* HEADER */
.header { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; z-index:50; }
.btn-r { background:rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.35); border-radius:50%; width:50px; height:50px; font-size:22px; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; text-decoration:none; transition:transform .15s; backdrop-filter:blur(8px); }
.btn-r:active { transform:scale(.88); }
.progress-wrap { flex:1; margin:0 12px; }
.progress-label { font-family:έΑαNunitoέΑβ,sans-serif; font-size:11px; color:rgba(255,255,255,.75); text-align:center; margin-bottom:4px; }
.progress-bar { height:14px; background:rgba(255,255,255,.2); border-radius:10px; overflow:hidden; border:2px solid rgba(255,255,255,.3); }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#FFD700,#FF8C00); border-radius:8px; transition:width .4s cubic-bezier(.34,1.56,.64,1); }
.progress-stars { display:flex; justify-content:space-around; margin-top:3px; font-size:14px; }

/* CANVAS JEU */
#c { position:fixed; inset:0; width:100%; height:100%; }

/* TITRE */
.title-area { position:fixed; top:86px; left:0; right:0; text-align:center; pointer-events:none; z-index:10; }
.title-area h1 { font-size:clamp(20px,5.5vw,30px); color:#fff; font-weight:800; text-shadow:0 3px 0 rgba(0,60,140,.7); }
.title-area p  { font-family:έΑαNunitoέΑβ,sans-serif; font-size:clamp(11px,3vw,14px); color:rgba(255,255,255,.7); margin-top:2px; }

/* POP */
.pop { position:fixed; pointer-events:none; z-index:90; font-size:36px; animation:popOut .55s ease-out forwards; }
@keyframes popOut { 0%{transform:scale(0);opacity:1;} 55%{transform:scale(1.5);opacity:1;} 100%{transform:scale(0);opacity:0;} }

/* ===== ├ΚCRAN VICTOIRE ===== */
.win-screen {
position:fixed; inset:0; z-index:200;
background:linear-gradient(160deg,#ff8c00 0%,#ffd700 40%,#ffe066 70%,#fff5cc 100%);
display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
padding-top:20px;
opacity:0; pointer-events:none;
transition:opacity .5s;
overflow:hidden;
}
.win-screen.show { opacity:1; pointer-events:all; }

/* Soleil safari en fond */
.win-screen::before {
content:έΑβέΑβ;
position:absolute;
top:-80px; left:50%; transform:translateX(-50%);
width:300px; height:300px;
background:radial-gradient(circle, rgba(255,255,255,.4) 0%, transparent 70%);
border-radius:50%;
animation:sunGlow 3s ease-in-out infinite;
}
@keyframes sunGlow { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.15);} }

.win-title {
font-size:clamp(30px,8vw,48px); color:#8B2500; font-weight:800;
text-shadow:0 3px 0 rgba(255,255,255,.5);
animation:titlePop .5s .1s cubic-bezier(.34,1.56,.64,1) both;
position:relative; z-index:2;
}
@keyframes titlePop { from{transform:scale(0) rotate(-5deg);} to{transform:scale(1) rotate(0);} }

.win-stars {
font-size:clamp(28px,7vw,40px); margin:6px 0;
animation:starsIn .5s .2s cubic-bezier(.34,1.56,.64,1) both;
position:relative; z-index:2;
}
@keyframes starsIn { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }

.win-sub {
font-family:έΑαNunitoέΑβ,sans-serif;
font-size:clamp(13px,3.5vw,18px); color:#5a1a00;
margin-bottom:8px;
animation:fadeIn .5s .35s both;
position:relative; z-index:2;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

/* Canvas Three.js pour Simba */
#simba-canvas {
width:min(280px, 75vw);
height:min(280px, 75vw);
position:relative; z-index:2;
border-radius:50%;
background:radial-gradient(circle, rgba(255,200,80,.3) 0%, transparent 70%);
animation:simbaEntry .7s .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes simbaEntry { from{transform:scale(0) rotate(-20deg);} to{transform:scale(1) rotate(0);} }

/* Herbe savane */
.savane {
position:absolute; bottom:0; left:0; right:0; height:80px;
background:linear-gradient(180deg, #7dc43a 0%, #4a8a1a 100%);
border-radius:60% 60% 0 0 / 30px 30px 0 0;
z-index:1;
}
.savane::before {
content:έΑαΏθΝ╛ΏθΝ┐ΏθΝ╛ΏθΝ┐ΏθΝ╛ΏθΝ┐ΏθΝ╛ΏθΝ┐ΏθΝ╛έΑβ;
position:absolute; top:-16px; left:0; right:0;
font-size:20px; text-align:center; letter-spacing:4px;
}

/* Boutons */
.win-btns {
display:flex; gap:14px; margin-top:10px;
animation:fadeIn .5s .6s both;
position:relative; z-index:3;
}
.win-btn {
padding:14px 28px; border:none; border-radius:20px;
font-family:έΑαBaloo 2έΑβ,cursive; font-weight:800;
font-size:clamp(14px,4vw,18px); cursor:pointer;
box-shadow:0 6px 0 rgba(0,0,0,.2); transition:transform .1s;
}
.win-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2); }
.btn-rejouer { background:#FF6B00; color:white; }
.btn-menu { background:rgba(255,255,255,.7); color:#5a1a00; }

/* Confettis */
.confetti { position:absolute; border-radius:2px; pointer-events:none; animation:confettiFall linear forwards; z-index:1; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }
</style>

</head>
<body>

<div class="bg">
  <div class="ray"></div><div class="ray"></div><div class="ray"></div>
  <div class="ray"></div><div class="ray"></div>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="bulles.mp3" type="audio/mpeg">
</audio>

<div class="header">
  <a class="btn-r" href="index.html">έυΖΎ╕Π</a>
  <div class="progress-wrap">
    <div class="progress-label" id="progLabel">├Κclate 20 bulles pour lib├σrer Simba ! Ώθτπ</div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-stars" id="progStars">
      <span>έαΗ</span><span>έαΗ</span><span>έαΗ</span><span>έαΗ</span><span>έαΗ</span>
    </div>
  </div>
  <button class="btn-r" id="mBtn">ΏθΟ╡</button>
</div>

<div class="title-area">
  <h1>Ώθτπ Les Bulles !</h1>
  <p>├Κclate 20 bulles pour lib├σrer Simba !</p>
</div>

<canvas id="c"></canvas>

<!-- ├ΚCRAN VICTOIRE -->

<div class="win-screen" id="winScreen">
  <div class="win-title">ΏθοΒ Simba est libre !</div>
  <div class="win-stars">έφΡέφΡέφΡ</div>
  <div class="win-sub">Bravo Malo, tu es le Roi des Bulles ! ΏθΣΣ</div>
  <canvas id="simba-canvas"></canvas>
  <div class="win-btns">
    <button class="win-btn btn-rejouer" id="btnRejouer">ΏθΦΕ Rejouer</button>
    <a class="win-btn btn-menu" href="index.html">ΏθΠι Menu</a>
  </div>
  <div class="savane"></div>
</div>

<!-- Three.js -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ============================================================
   CHARGEUR GLB MINIMAL (sans GLTFLoader CDN - on l'int├ρgre)
   ============================================================ */

// Mini GLTFLoader inline (r128 compatible)
// On utilise la version importmap-free
let simbaScene = null;

function loadSimba() {
  // Charger GLTFLoader depuis CDN
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => initSimba3D();
  script.onerror = () => console.log('GLTFLoader non charg├σ');
  document.head.appendChild(script);
}

function initSimba3D() {
  const canvas3d = document.getElementById('simba-canvas');
  const size = canvas3d.offsetWidth || 260;
  canvas3d.width  = size;
  canvas3d.height = size;

  // Renderer
  const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
  renderer.setSize(size, size);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.shadowMap.enabled = false;

  // Sc├ρne
  const scene = new THREE.Scene();

  // Cam├σra
  const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
  camera.position.set(0, 1.2, 4);
  camera.lookAt(0, 0.6, 0);

  // Lumi├ρres
  const ambient = new THREE.AmbientLight(0xfff5e0, 1.2);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffd580, 2);
  dirLight.position.set(3, 5, 3);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xff8c00, 0.5);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  // Charger Simba.glb
  const loader = new THREE.GLTFLoader();
  loader.load(
    'Simba.glb',
    (gltf) => {
      const model = gltf.scene;

      // Centrer et dimensionner
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const sizeVec = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(sizeVec.x, sizeVec.y, sizeVec.z);
      const scale = 5.5 / maxDim;

      model.position.sub(center);
      model.scale.setScalar(scale);
      model.position.y = -sizeVec.y * scale * 0.3;

      scene.add(model);
      simbaScene = { model, renderer, scene, camera };

      // Animation loop
      let t = 0;
      function animate() {
        requestAnimationFrame(animate);
        t += 0.02;
        // Rotation douce
        model.rotation.y = Math.PI;
        // L├σg├ρre l├σvitation
        model.position.y = -sizeVec.y * scale * 0.3 + Math.sin(t) * 0.06;
        renderer.render(scene, camera);
      }
      animate();
    },
    undefined,
    (err) => {
      // Fallback si le mod├ρle ne charge pas
      canvas3d.style.display = 'none';
      console.log('Erreur chargement Simba:', err);
    }
  );
}

/* ============================================================
   JEU DES BULLES
   ============================================================ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, bubbles = [], score = 0, gameOver = false;
const MAX = 20;

const ANIMALS = ['ΏθΡθ','ΏθΡι','ΏθΡκ','ΏθοΙ','ΏθΡβ','ΏθοΣ','ΏθοΑ','Ώθοη','ΏθΡυ','ΏθΡ│','Ώθοφ','ΏθΡπ','ΏθοΡ','έφΡ','Ώθς╕','ΏθΡγ','ΏθΝΛ','ΏθΡΜ'];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Bubble {
  constructor(init) { this.reset(init); }
  reset(init) {
    this.r  = 30 + Math.random() * 46;
    this.x  = this.r + Math.random() * Math.max(1, W - this.r * 2);
    this.y  = init ? Math.random() * H : H + this.r * 2;
    this.vx = (Math.random() - .5) * 1.1;
    this.vy = -(0.65 + Math.random() * 1.2);
    this.a  = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    this.hue= 170 + Math.random() * 55;
    this.op = .6 + Math.random() * .28;
    this.wb = Math.random() * Math.PI * 2;
    this.ws = .018 + Math.random() * .026;
  }
  update() {
    this.wb += this.ws;
    this.x  += this.vx + Math.sin(this.wb) * .32;
    this.y  += this.vy;
    if (this.y < -this.r * 2) this.reset(false);
    if (this.x < this.r || this.x > W - this.r) this.vx *= -1;
  }
  draw() {
    const x = this.x, y = this.y, r = this.r;
    ctx.save();
    ctx.globalAlpha = this.op;
    const g = ctx.createRadialGradient(x-r*.28,y-r*.28,r*.08,x,y,r);
    g.addColorStop(0,`hsla(${this.hue},75%,92%,.85)`);
    g.addColorStop(.5,`hsla(${this.hue},65%,65%,.4)`);
    g.addColorStop(1,`hsla(${this.hue},75%,50%,.65)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x-r*.26,y-r*.3,r*.2,r*.1,-Math.PI/4,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,.58)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = `hsla(${this.hue},65%,82%,.75)`;
    ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.font = `${r*.88}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.a, x, y+2);
    ctx.restore();
  }
  hit(px,py) { return Math.hypot(px-this.x, py-this.y) < this.r; }
}

function initBubbles() {
  const n = Math.min(10, Math.floor(W*H/36000)+4);
  bubbles = Array.from({length:n}, () => new Bubble(true));
}

function loop() {
  ctx.clearRect(0,0,W,H);
  if (!gameOver) bubbles.forEach(b => { b.update(); b.draw(); });
  requestAnimationFrame(loop);
}

function updateProgress() {
  const pct = (score / MAX) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent =
    score < MAX ? `${score} / ${MAX} bulles pour lib├σrer Simba ! Ώθτπ` : 'ΏθοΒ Simba est libre !';
  const stars = document.getElementById('progStars').children;
  const filled = Math.floor(score / 4);
  for (let i=0;i<5;i++) stars[i].textContent = i < filled ? 'έφΡ' : 'έαΗ';
}

function playPop(pitch) {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine';
    o.frequency.setValueAtTime(700*pitch, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(150*pitch, ac.currentTime+.18);
    g.gain.setValueAtTime(.28, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+.22);
    o.start(); o.stop(ac.currentTime+.25);
  } catch(e){}
}

function playVictory() {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047,1319].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(.22,ac.currentTime+i*.14);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.14+.4);
      o.start(ac.currentTime+i*.14);o.stop(ac.currentTime+i*.14+.45);
    });
  } catch(e){}
}

function launchConfetti() {
  const colors=['#FFD700','#FF6B00','#FF4444','#44BBFF','#44FF88','#FF88CC'];
  const ws = document.getElementById('winScreen');
  for (let i=0;i<70;i++) {
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      const s=5+Math.random()*10;
      el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${s}px;height:${s}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.3}s;transform:rotate(${Math.random()*360}deg);`;
      ws.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    }, i*35);
  }
}

function showVictory() {
  gameOver = true;
  document.getElementById('bgMusic').pause();
  updateProgress();
  setTimeout(()=>{
    document.getElementById('winScreen').classList.add('show');
    launchConfetti();
    playVictory();
    loadSimba(); // Charger Simba 3D
  }, 300);
}

function popBubble(b, cx, cy) {
  const el=document.createElement('div');
  el.className='pop'; el.textContent=b.a;
  el.style.left=(cx-18)+'px'; el.style.top=(cy-18)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 650);
  playPop(.75+Math.random()*.6);
  score++;
  updateProgress();
  if (score >= MAX) { showVictory(); return; }
  b.reset(false);
}

function onInput(e) {
  e.preventDefault();
  if (gameOver) return;
  if (!musicStarted) startMusic();
  const list = e.changedTouches ? Array.from(e.changedTouches) : [{clientX:e.clientX,clientY:e.clientY}];
  list.forEach(t=>{
    const rect=canvas.getBoundingClientRect();
    const px=(t.clientX-rect.left)*(W/rect.width);
    const py=(t.clientY-rect.top)*(H/rect.height);
    let hit=false;
    for (const b of bubbles) {
      if (b.hit(px,py)) { popBubble(b,t.clientX,t.clientY); hit=true; break; }
    }
    if (!hit) {
      const el=document.createElement('div'); el.className='pop'; el.textContent='ΏθΤπ';
      el.style.cssText=`left:${t.clientX-14}px;top:${t.clientY-14}px;font-size:20px;`;
      document.body.appendChild(el); setTimeout(()=>el.remove(),500);
    }
  });
}

canvas.addEventListener('touchstart', onInput, {passive:false});
canvas.addEventListener('mousedown',  onInput);

document.getElementById('btnRejouer').addEventListener('click', ()=>{
  score=0; gameOver=false;
  updateProgress();
  document.getElementById('winScreen').classList.remove('show');
  document.querySelectorAll('.confetti').forEach(e=>e.remove());
  // D├σtruire Three.js canvas
  const sc = document.getElementById('simba-canvas');
  sc.style.display='';
  initBubbles();
  startMusic();
});

/* MUSIQUE */
let musicOn=true, musicStarted=false;
const music = document.getElementById('bgMusic');

function startMusic() {
  if (musicStarted && !music.paused) return;
  music.volume=0.6;
  music.play().catch(()=>{});
  musicStarted=true;
}

document.getElementById('mBtn').addEventListener('click', ()=>{
  musicOn=!musicOn;
  document.getElementById('mBtn').textContent=musicOn?'ΏθΟ╡':'ΏθΦΘ';
  if(musicOn) startMusic(); else music.pause();
});

document.addEventListener('touchstart', function onF(){ startMusic(); document.removeEventListener('touchstart',onF); },{once:true,passive:true});
document.addEventListener('mousedown',  function onF(){ startMusic(); document.removeEventListener('mousedown',onF); },{once:true});

/* Particules */
const bg=document.querySelector('.bg');
for(let i=0;i<18;i++){
  const p=document.createElement('div'); p.className='particle';
  const s=2+Math.random()*7;
  p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${-Math.random()*12}s;`;
  bg.appendChild(p);
}

updateProgress();
initBubbles();
loop();
</script>

</body>
