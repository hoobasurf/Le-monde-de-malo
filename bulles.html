<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0066cc">
<title>Les Bulles 🫧 - Malo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Baloo 2',cursive;touch-action:manipulation;}
  .bg{position:fixed;inset:0;background:linear-gradient(180deg,#001a4d 0%,#003580 20%,#0066cc 55%,#0099e6 80%,#33bbff 100%);overflow:hidden;}
  .ray{position:absolute;top:0;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);transform-origin:top center;}
  .ray:nth-child(1){left:10%;width:60px;height:70%;transform:rotate(-8deg);}
  .ray:nth-child(2){left:25%;width:80px;height:85%;transform:rotate(-3deg);}
  .ray:nth-child(3){left:50%;width:60px;height:75%;transform:rotate(5deg);}
  .ray:nth-child(4){left:70%;width:50px;height:65%;transform:rotate(10deg);}
  .ray:nth-child(5){left:85%;width:60px;height:80%;transform:rotate(-5deg);}
  .particle{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);animation:rise linear infinite;pointer-events:none;}
  @keyframes rise{from{transform:translateY(100vh)scale(0);opacity:0;}10%{opacity:.4;}90%{opacity:.2;}to{transform:translateY(-100px)scale(1);opacity:0;}}
  .header{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;z-index:50;}
  .back-btn,.music-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50%;width:52px;height:52px;font-size:24px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s;backdrop-filter:blur(8px);}
  .back-btn:active,.music-btn:active{transform:scale(.9);}
  .score-area{text-align:center;}
  .score-label{font-family:'Nunito',sans-serif;font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;}
  .score-num{font-size:36px;font-weight:800;color:white;text-shadow:0 0 20px rgba(0,200,255,.8);line-height:1;}
  #canvas{position:fixed;inset:0;width:100%;height:100%;}
  .title-float{position:fixed;top:90px;left:0;right:0;text-align:center;pointer-events:none;z-index:10;}
  .title-float h1{font-size:clamp(22px,6vw,34px);color:white;text-shadow:0 3px 0 rgba(0,80,160,.6),0 0 20px rgba(0,200,255,.5);font-weight:800;}
  .title-float p{font-family:'Nunito',sans-serif;font-size:clamp(12px,3.5vw,16px);color:rgba(255,255,255,.75);margin-top:2px;}
  .bravo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)scale(0);background:rgba(255,255,255,.96);border-radius:32px;padding:28px 40px;text-align:center;z-index:100;box-shadow:0 16px 48px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
  .bravo.show{transform:translate(-50%,-50%)scale(1);}
  .bravo-emoji{font-size:64px;display:block;animation:bb .5s ease-in-out infinite alternate;}
  @keyframes bb{from{transform:translateY(0);}to{transform:translateY(-8px);}}
  .bravo-text{font-size:30px;font-weight:800;color:#0066cc;margin-top:8px;}
  .pop-effect{position:fixed;pointer-events:none;z-index:80;font-size:36px;animation:popOut .6s ease-out forwards;}
  @keyframes popOut{0%{transform:scale(0);opacity:1;}60%{transform:scale(1.5);opacity:1;}100%{transform:scale(0);opacity:0;}}
</style>
</head>
<body>
<div class="bg">
  <div class="ray"></div><div class="ray"></div><div class="ray"></div>
  <div class="ray"></div><div class="ray"></div>
</div>
<div class="header">
  <a class="back-btn" href="index.html">⬅️</a>
  <div class="score-area">
    <div class="score-label">Bulles éclatées</div>
    <div class="score-num" id="scoreNum">0</div>
  </div>
  <button class="music-btn" id="musicBtn">🎵</button>
</div>
<div class="title-float">
  <h1>🫧 Les Bulles !</h1>
  <p>Touche les bulles pour les éclater !</p>
</div>
<canvas id="canvas"></canvas>
<div class="bravo" id="bravo">
  <span class="bravo-emoji">🎉</span>
  <div class="bravo-text">Super Malo !</div>
</div>
<script src="melody.js"></script>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H,bubbles=[],score=0,musicOn=true,started=false;

const ANIMALS=[‘🐟’,‘🐠’,‘🐡’,‘🦈’,‘🐙’,‘🦑’,‘🦀’,‘🦞’,‘🐬’,‘🐳’,‘🐋’,‘🦭’,‘🐧’,‘🦐’,‘🌊’,‘⭐’,‘🪸’,‘🐚’,‘🐠’,‘🐟’];

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener(‘resize’,resize);

class Bubble{
constructor(){this.reset(true);}
reset(init=false){
this.r=32+Math.random()*46;
this.x=this.r+Math.random()*(W-this.r*2);
this.y=init?Math.random()*H:H+this.r*2;
this.vx=(Math.random()-.5)*1.2;
this.vy=-(0.8+Math.random()*1.4);
this.animal=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
this.hue=160+Math.random()*60;
this.alpha=.6+Math.random()*.3;
this.wobble=Math.random()*Math.PI*2;
this.wobbleSpeed=.02+Math.random()*.03;
}
update(){
this.wobble+=this.wobbleSpeed;
this.x+=this.vx+Math.sin(this.wobble)*.4;
this.y+=this.vy;
if(this.y<-this.r*2)this.reset();
if(this.x<this.r||this.x>W-this.r)this.vx*=-1;
}
draw(){
ctx.save();ctx.globalAlpha=this.alpha;
const g=ctx.createRadialGradient(this.x-this.r*.3,this.y-this.r*.3,this.r*.1,this.x,this.y,this.r);
g.addColorStop(0,`hsla(${this.hue},80%,90%,.8)`);
g.addColorStop(.5,`hsla(${this.hue},70%,65%,.4)`);
g.addColorStop(1,`hsla(${this.hue},80%,50%,.6)`);
ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
ctx.beginPath();ctx.ellipse(this.x-this.r*.25,this.y-this.r*.3,this.r*.22,this.r*.12,-Math.PI/4,0,Math.PI*2);
ctx.fillStyle=‘rgba(255,255,255,.55)’;ctx.fill();
ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.strokeStyle=`hsla(${this.hue},70%,80%,.8)`;ctx.lineWidth=2;ctx.stroke();
ctx.globalAlpha=1;
ctx.font=`${this.r*.9}px serif`;ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;
ctx.fillText(this.animal,this.x,this.y+2);
ctx.restore();
}
hit(px,py){return Math.hypot(px-this.x,py-this.y)<this.r;}
}

function initBubbles(){
const count=Math.min(12,Math.floor(W*H/35000)+5);
bubbles=Array.from({length:count},()=>new Bubble());
}

function loop(){
ctx.clearRect(0,0,W,H);
bubbles.forEach(b=>{b.update();b.draw();});
requestAnimationFrame(loop);
}

function popBubble(b,cx,cy){
const pop=document.createElement(‘div’);
pop.className=‘pop-effect’;pop.textContent=b.animal;
pop.style.left=(cx-18)+‘px’;pop.style.top=(cy-18)+‘px’;
document.body.appendChild(pop);setTimeout(()=>pop.remove(),700);
MaloMelody.playPop(.8+Math.random()*.6);
score++;document.getElementById(‘scoreNum’).textContent=score;
if(score%10===0){showBravo();MaloMelody.playBravo();}
b.reset();
}

function showBravo(){
const el=document.getElementById(‘bravo’);
el.classList.add(‘show’);setTimeout(()=>el.classList.remove(‘show’),2500);
}

function handleInput(e){
e.preventDefault();
if(!started)startMusic();
const list=e.changedTouches||[{clientX:e.clientX,clientY:e.clientY}];
Array.from(list).forEach(t=>{
const rect=canvas.getBoundingClientRect();
const px=t.clientX-rect.left,py=t.clientY-rect.top;
let hit=false;
for(const b of bubbles){
if(b.hit(px,py)){popBubble(b,t.clientX,t.clientY);hit=true;break;}
}
if(!hit){
const d=document.createElement(‘div’);d.className=‘pop-effect’;d.textContent=‘💧’;
d.style.cssText=`left:${t.clientX-16}px;top:${t.clientY-16}px;font-size:20px;`;
document.body.appendChild(d);setTimeout(()=>d.remove(),500);
}
});
}

canvas.addEventListener(‘touchstart’,handleInput,{passive:false});
canvas.addEventListener(‘mousedown’,handleInput);

// Particules de fond
for(let i=0;i<15;i++){
const p=document.createElement(‘div’);p.className=‘particle’;
const s=3+Math.random()*8;
p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${5+Math.random()*10}s;animation-delay:${-Math.random()*10}s;`;
document.querySelector(’.bg’).appendChild(p);
}

function startMusic(){if(!started&&musicOn){MaloMelody.play(‘bulles’);started=true;}}
document.getElementById(‘musicBtn’).addEventListener(‘click’,()=>{
musicOn=!musicOn;
document.getElementById(‘musicBtn’).textContent=musicOn?‘🎵’:‘🔇’;
if(musicOn){MaloMelody.play(‘bulles’);started=true;}else MaloMelody.stop();
});
document.addEventListener(‘pointerdown’,function onFirst(){startMusic();document.removeEventListener(‘pointerdown’,onFirst);},{once:true});

initBubbles();loop();
</script>

</body>
</html>
