<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0066cc">
<title>Les Bulles - Malo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Baloo 2',cursive;}
body{background:linear-gradient(180deg,#001a4d 0%,#003580 20%,#0066cc 55%,#0099e6 80%,#33bbff 100%);}
.ray{position:fixed;top:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);transform-origin:top center;pointer-events:none;z-index:1;}
.ray:nth-child(1){left:10%;width:60px;height:70%;transform:rotate(-8deg);}
.ray:nth-child(2){left:25%;width:80px;height:85%;transform:rotate(-3deg);}
.ray:nth-child(3){left:50%;width:60px;height:75%;transform:rotate(5deg);}
.ray:nth-child(4){left:70%;width:50px;height:65%;transform:rotate(10deg);}
.ray:nth-child(5){left:85%;width:60px;height:80%;transform:rotate(-5deg);}
canvas{position:fixed;top:0;left:0;z-index:2;display:block;touch-action:none;}
.header{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;z-index:10;pointer-events:none;}
.back-btn,.music-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50%;width:52px;height:52px;font-size:24px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;backdrop-filter:blur(8px);pointer-events:auto;}
.score-area{text-align:center;}
.score-label{font-family:'Nunito',sans-serif;font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;}
.score-num{font-size:36px;font-weight:800;color:white;line-height:1;}
.titre{position:fixed;top:90px;left:0;right:0;text-align:center;pointer-events:none;z-index:10;}
.titre h1{font-size:28px;color:white;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.titre p{font-family:'Nunito',sans-serif;font-size:14px;color:rgba(255,255,255,.8);margin-top:4px;}
.bravo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:white;border-radius:32px;padding:28px 40px;text-align:center;z-index:20;box-shadow:0 16px 48px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.bravo.show{transform:translate(-50%,-50%) scale(1);}
.bravo-emoji{font-size:64px;display:block;}
.bravo-text{font-size:30px;font-weight:800;color:#0066cc;margin-top:8px;}
.pop{position:fixed;pointer-events:none;z-index:15;font-size:36px;animation:popOut .6s ease-out forwards;}
@keyframes popOut{0%{transform:scale(0);opacity:1;}60%{transform:scale(1.5);}100%{transform:scale(0);opacity:0;}}
</style>
</head>
<body>
<div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div>
<canvas id="cv"></canvas>
<div class="header">
  <a class="back-btn" href="index.html">&#8592;</a>
  <div class="score-area">
    <div class="score-label">Bulles</div>
    <div class="score-num" id="score">0</div>
  </div>
  <button class="music-btn" id="mBtn">&#127925;</button>
</div>
<div class="titre">
  <h1>&#129511; Les Bulles !</h1>
  <p>Touche les bulles pour les eclater !</p>
</div>
<div class="bravo" id="bravo">
  <span class="bravo-emoji">&#127881;</span>
  <div class="bravo-text">Super Malo !</div>
</div>
<script src="melody.js"></script>
<script>
var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');
var W, H, bubbles = [], score = 0, musicOn = true, started = false;

var ANIMALS = [‘🐟’,‘🐠’,‘🐡’,‘🦈’,‘🐙’,‘🦑’,‘🦀’,‘🦞’,‘🐬’,‘🐳’,‘🦭’,‘🐧’,‘🦐’,‘⭐’,‘🐚’];

function resize() {
// Sur iOS, screen.width/height donne les vraies dimensions physiques
W = window.innerWidth || screen.width;
H = window.innerHeight || screen.height;
cv.width  = W;
cv.height = H;
}

function mkBubble(init) {
var r = 36 + Math.random() * 44;
return {
r:r, x:r+Math.random()*Math.max(10,W-r*2),
y:init ? Math.random()*H : H+r*2,
vx:(Math.random()-.5)*1.2, vy:-(0.9+Math.random()*1.3),
a:ANIMALS[Math.floor(Math.random()*ANIMALS.length)],
hue:160+Math.random()*60, al:.65+Math.random()*.25,
w:Math.random()*Math.PI*2, ws:.02+Math.random()*.03
};
}

function resetB(b) {
var r=36+Math.random()*44;
b.r=r; b.x=r+Math.random()*Math.max(10,W-r*2); b.y=H+r*2;
b.vx=(Math.random()-.5)*1.2; b.vy=-(0.9+Math.random()*1.3);
b.a=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
b.hue=160+Math.random()*60; b.al=.65+Math.random()*.25;
}

function initBubbles() {
var n=Math.min(12,Math.floor(W*H/35000)+5);
bubbles=[];
for(var i=0;i<n;i++) bubbles.push(mkBubble(true));
}

function drawB(b) {
ctx.save(); ctx.globalAlpha=b.al;
var g=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,b.r*.1,b.x,b.y,b.r);
g.addColorStop(0,‘hsla(’+b.hue+’,80%,90%,.8)’);
g.addColorStop(.5,‘hsla(’+b.hue+’,70%,65%,.4)’);
g.addColorStop(1,‘hsla(’+b.hue+’,80%,50%,.6)’);
ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
ctx.beginPath();
ctx.ellipse(b.x-b.r*.25,b.y-b.r*.3,b.r*.22,b.r*.12,-Math.PI/4,0,Math.PI*2);
ctx.fillStyle=‘rgba(255,255,255,.55)’; ctx.fill();
ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.strokeStyle=‘hsla(’+b.hue+’,70%,80%,.8)’; ctx.lineWidth=2; ctx.stroke();
ctx.globalAlpha=1;
ctx.font=Math.round(b.r*.85)+‘px serif’;
ctx.textAlign=‘center’; ctx.textBaseline=‘middle’;
ctx.fillText(b.a,b.x,b.y+2);
ctx.restore();
}

function loop() {
ctx.clearRect(0,0,W,H);
for(var i=0;i<bubbles.length;i++){
var b=bubbles[i];
b.w+=b.ws; b.x+=b.vx+Math.sin(b.w)*.4; b.y+=b.vy;
if(b.y<-b.r*2) resetB(b);
if(b.x<b.r||b.x>W-b.r) b.vx*=-1;
drawB(b);
}
requestAnimationFrame(loop);
}

function startMusic(){
if(!started&&musicOn){MaloMelody.play(‘bulles’);started=true;}
}

function showBravo(){
var el=document.getElementById(‘bravo’);
el.classList.add(‘show’);
setTimeout(function(){el.classList.remove(‘show’);},2500);
}

function pop(b,px,py){
var d=document.createElement(‘div’); d.className=‘pop’; d.textContent=b.a;
d.style.left=(px-18)+‘px’; d.style.top=(py-18)+‘px’;
document.body.appendChild(d);
setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},700);
MaloMelody.playPop(.8+Math.random()*.6);
score++; document.getElementById(‘score’).textContent=score;
if(score%10===0){showBravo();MaloMelody.playBravo();}
resetB(b);
}

function onTouch(e){
e.preventDefault();
startMusic();
var pts=e.changedTouches||[e];
for(var i=0;i<pts.length;i++){
var px=pts[i].clientX, py=pts[i].clientY, hit=false;
for(var j=0;j<bubbles.length;j++){
if(Math.hypot(px-bubbles[j].x,py-bubbles[j].y)<bubbles[j].r){
pop(bubbles[j],px,py); hit=true; break;
}
}
if(!hit){
var d=document.createElement(‘div’); d.className=‘pop’; d.textContent=‘💧’;
d.style.left=(px-16)+‘px’; d.style.top=(py-16)+‘px’; d.style.fontSize=‘20px’;
document.body.appendChild(d);
setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},500);
}
}
}

document.getElementById(‘mBtn’).addEventListener(‘click’,function(){
musicOn=!musicOn;
document.getElementById(‘mBtn’).innerHTML=musicOn?’🎵’:’🔇’;
if(musicOn){MaloMelody.play(‘bulles’);started=true;}else MaloMelody.stop();
});

document.body.addEventListener(‘touchstart’,onTouch,{passive:false});
document.body.addEventListener(‘mousedown’,onTouch);
window.addEventListener(‘resize’,function(){resize();initBubbles();});

// Lancement — setTimeout 0 pour laisser iOS calculer les dimensions
resize();
if(W < 10) {
setTimeout(function(){ resize(); initBubbles(); loop(); }, 100);
} else {
initBubbles();
loop();
}
</script>

</body>
</html>
